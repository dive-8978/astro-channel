<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>AstroBridge Local Dashboard</title>
<style>
body{
  background:#111;
  color:#0f0;
  font-family:monospace;
  padding:20px;
}
.card{
  border:1px solid #0f03;
  padding:15px;
  margin:10px 0;
}
button{
  background:#000;
  color:#0f0;
  border:1px solid #0f0;
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>🚀 AstroBridge 本地运维控制台</h2>

<div class="card">
  <div>系统状态: <span id="status">-</span></div>
  <div>机器人数量: <span id="robotCount">0</span></div>
  <div>队列长度: <span id="queueSize">0</span></div>
  <div>成功率: <span id="successRate">0%</span></div>
  <div>当前模式: <span id="mode">SAFE</span></div>
</div>

<div class="card">
  <button onclick="refresh()">刷新</button>
  <button onclick="repair()">修复</button>
  <button onclick="pause()">KillSwitch</button>
</div>

<div class="card">
  <pre id="log"></pre>
</div>

<script>
async function api(path,data={}){
  const res=await fetch(path,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  return await res.json();
}

function log(msg){
  const el=document.getElementById("log");
  el.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
}

async function refresh(){
  const d=await api("/api/dashboard/state");
  document.getElementById("status").innerText=d.status||"-";
  document.getElementById("robotCount").innerText=d.robotCount||0;
  document.getElementById("queueSize").innerText=d.queueSize||0;
  document.getElementById("successRate").innerText=(d.successRate||0)+"%";
  document.getElementById("mode").innerText=d.mode||"SAFE";
  log("状态刷新完成");
}

async function repair(){
  await api("/api/dashboard/repair");
  log("修复执行");
}

async function pause(){
  await api("/api/dashboard/pause");
  log("系统暂停");
}

setInterval(refresh,3000);
refresh();
</script>

</body>
</html>
