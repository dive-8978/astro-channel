<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge Global Developer Console</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
<div class="logo"><img src="/favicon.ico" style="height:1.5em; margin-right:8px; vertical-align:middle;">AstroBridge</div>
background:#020a1a;
overflow:hidden;
font-family:system-ui;
}

#scene-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#holoText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#4cc9f0;
font-size:28px;
text-shadow:0 0 20px #4cc9f0;
opacity:0;
pointer-events:none;
transition:opacity .3s;
}

.home-btn{
position:fixed;
top:20px;
left:20px;
padding:8px 16px;
border:1px solid #4cc9f0;
color:#4cc9f0;
background:rgba(0,0,0,.4);
border-radius:6px;
cursor:pointer;
}

.api-panel{
position:fixed;
top:20px;
right:20px;
background:rgba(0,10,30,.85);
border:1px solid #4cc9f0;
border-radius:10px;
padding:16px 20px;
color:#fff;
min-width:280px;
backdrop-filter:blur(6px);
}

.api-panel h3{
color:#4cc9f0;
margin-bottom:10px;
}

.api-item{
margin:8px 0;
padding:8px 12px;
background:rgba(255,255,255,.05);
border-radius:6px;
cursor:pointer;
}

.api-item:hover{
background:rgba(76,201,240,.2);
}

</style>
</head>

<body>

<div id="scene-container"></div>

<div id="holoText">API LINK ESTABLISHED</div>

<div class="home-btn" onclick="location.href='index.html'">← Home</div>

<div class="api-panel">
<h3>Global API Ports</h3>

<div class="api-item" onclick="goApi('/api/v1/nodes')">
Node Status • 8080
</div>

<div class="api-item" onclick="goApi('/api/v1/bridge')">
AstroBridge Core • 8081
</div>

<div class="api-item" onclick="goApi('/api/v1/chain')">
Chain Sync • 8082
</div>

<div class="api-item" onclick="goApi('/api/v1/dev')">
Developer Center • 8090
</div>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.168.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.168.0/examples/jsm/"
}
}
</script>

<script type="module">

import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

let scene,camera,renderer,controls
let earthMesh
let planetMeshes=[]
let beams=[]

const holoText=document.getElementById("holoText")

const planets=[
{name:'Sun',radius:5,color:0xffcc00,x:0},
{name:'Mercury',radius:.7,color:0xaaaaaa,x:8},
{name:'Venus',radius:1,color:0xeec86f,x:11},
{name:'Earth',radius:1.2,color:0x4499ff,x:14},
{name:'Mars',radius:.9,color:0xff6633,x:17}
]

const apiPositions=[
new THREE.Vector3(-20,15,0),
new THREE.Vector3(20,15,0),
new THREE.Vector3(-25,5,10),
new THREE.Vector3(25,5,-10)
]

function init(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
.1,
2000
)

camera.position.set(0,15,35)

renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document
.getElementById("scene-container")
.appendChild(renderer.domElement)

controls=new OrbitControls(camera,renderer.domElement)

controls.enableDamping=true

/* 星系背景 */

const stars=[]

for(let i=0;i<4000;i++){

stars.push(
(Math.random()-.5)*2000,
(Math.random()-.5)*2000,
(Math.random()-.5)*2000
)

}

const starGeo=new THREE.BufferGeometry()

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(stars,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:.7
})

scene.add(new THREE.Points(starGeo,starMat))

/* 太阳光 */

const sunLight=new THREE.PointLight(0xffcc00,3,300)

scene.add(sunLight)

/* 行星 */

planets.forEach(p=>{

const geo=new THREE.SphereGeometry(p.radius,64,64)

const mat=new THREE.MeshStandardMaterial({
color:p.color,
emissive:p.color,
emissiveIntensity:.25,
metalness:.5,
roughness:.4
})

const mesh=new THREE.Mesh(geo,mat)

mesh.position.x=p.x

mesh.userData.name=p.name

scene.add(mesh)

planetMeshes.push(mesh)

if(p.name==="Earth") earthMesh=mesh

/* 太阳光晕 */

if(p.name==="Sun"){

const glowGeo=new THREE.SphereGeometry(7,64,64)

const glowMat=new THREE.MeshBasicMaterial({
color:0xffcc66,
transparent:true,
opacity:.25
})

const glow=new THREE.Mesh(glowGeo,glowMat)

scene.add(glow)

}

/* 轨道 */

if(p.name!=="Sun"){

const points=[]

for(let i=0;i<=360;i++){

let a=THREE.MathUtils.degToRad(i)

points.push(
new THREE.Vector3(
Math.cos(a)*p.x,
0,
Math.sin(a)*p.x
)
)

}

const orbitGeo=new THREE.BufferGeometry().setFromPoints(points)

const orbitMat=new THREE.LineBasicMaterial({
color:p.color,
transparent:true,
opacity:.35
})

scene.add(new THREE.Line(orbitGeo,orbitMat))

}

})

window.addEventListener("click",onMouseClick)

animate()

setInterval(fireBeam,3200)

}

/* 点击地球 */

function onMouseClick(e){

const mouse=new THREE.Vector2(
(e.clientX/window.innerWidth)*2-1,
-(e.clientY/window.innerHeight)*2+1
)

const raycaster=new THREE.Raycaster()

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(scene.children)

for(const obj of intersects){

if(obj.object.userData.name==="Earth"){

flyToEarth()

setTimeout(()=>{
alert("Developer Center")
},1600)

}

}

}

function flyToEarth(){

const target=earthMesh.position.clone()
.add(new THREE.Vector3(0,2,5))

const start=camera.position.clone()

const startT=Date.now()

function update(){

const t=Math.min(1,(Date.now()-startT)/1600)

camera.position.lerpVectors(start,target,t)

camera.lookAt(earthMesh.position)

if(t<1) requestAnimationFrame(update)

}

update()

}

/* 光束 */

function fireBeam(){

const group=[]

apiPositions.forEach(pos=>{

const geo=new THREE.BufferGeometry()
.setFromPoints([pos.clone(),earthMesh.position.clone()])

const mat=new THREE.LineBasicMaterial({
color:0x4cc9f0,
transparent:true,
opacity:.9
})

const beam=new THREE.Line(geo,mat)

scene.add(beam)

group.push(beam)

})

holoText.style.opacity=1

setTimeout(()=>{holoText.style.opacity=0},1200)

setTimeout(()=>{
group.forEach(b=>scene.remove(b))
},1200)

}

/* API */

window.goApi=function(path){

holoText.style.opacity=1

setTimeout(()=>{holoText.style.opacity=0},800)

alert("Open API "+path)

}

/* 动画 */

function animate(){

requestAnimationFrame(animate)

controls.update()

planetMeshes.forEach(p=>{
p.rotation.y+=0.01
})

scene.rotation.y+=0.0006

renderer.render(scene,camera)

}

init()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
