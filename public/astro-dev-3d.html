<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AstroBridge Developer 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    #container { width: 100vw; height: 100vh; }

    /* 返回主页 */
    #backBtn {
      position: fixed; top: 24px; left: 30px;
      padding: 10px 20px;
      background: rgba(0,14,28,0.7);
      border: 1px solid #0ef;
      color: #0ef;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      z-index: 999;
    }
    #backBtn:hover { background: rgba(0,50,80,0.6); }

    /* 右侧开发者按钮面板 */
    .dev-panel {
      position: fixed; right: 26px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 16px; z-index: 999;
    }

    .dev-btn {
      width: 180px; height: 50px;
      background: rgba(0,10,25,0.85);
      border: 2px solid #0ef;
      border-radius: 10px;
      color: #fff;
      font-size: 14px; font-weight: bold;
      text-align: center; line-height: 50px;
      cursor: pointer;
      box-shadow: 0 0 12px #0ef;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
    }
    .dev-btn:hover {
      background: rgba(0,40,70,0.6);
      box-shadow: 0 0 20px #0ff;
      color: #0ff;
    }

    /* 悬浮提示 */
    .tooltip {
      position: absolute;
      background: rgba(0,10,30,0.9);
      color: #0ef;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      border: 1px solid #0ef;
      display: none;
      white-space: nowrap;
      z-index: 999;
    }
  </style>
</head>

<body>
<button id="backBtn">← Back to Home</button>

<div class="dev-panel">
  <div class="dev-btn" onclick="goDev(1)">Quick Connect</div>
  <div class="dev-btn" onclick="goDev(2)">API Docs</div>
  <div class="dev-btn" onclick="goDev(3)">Node Join</div>
  <div class="dev-btn" onclick="goDev(4)">DApp Connect</div>
  <div class="dev-btn" onclick="goDev(5)">Contract Info</div>
  <div class="dev-btn" onclick="goDev(6)">Earn ASTRO</div>
  <div class="dev-btn" onclick="goDev(7)">Console</div>
</div>

<div id="container"></div>
<div class="tooltip" id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// 返回主页
document.getElementById('backBtn').onclick = () => {
  window.location.href = 'index.html';
};

// 开发者按钮跳转
function goDev(index) {
  const txt = [
    'Quick Connect Intent Network',
    'API Docs: Execute / Query',
    'Apply Global Node',
    'DApp / Robot / AI Connect',
    'ASTRO Token & Burn Contract',
    'Developer Reward: Earn ASTRO',
    'Online Console: Status & Burn'
  ];
  alert(txt[index-1]);
}

// ======== Three.js 3D 球形架构 ========
const container = document.getElementById('container');
const tooltip = document.getElementById('tooltip');

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 9;
controls.maxDistance = 36;

// 发光效果
const renderScene = new THREE.RenderPass(scene, camera);
const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 1.7, 0.45, 0.06
);
const composer = new THREE.EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// 模块数据
const modules = [
  { id: 'core', name: 'Core System', size: 15, color: '#ff2266', isCore: true },
  { id: 'intent', name: 'Intent Layer', size: 9, color: '#00eeff' },
  { id: 'ai', name: 'AI Engine', size: 9, color: '#44ffaa' },
  { id: 'robot', name: 'Robot Cluster', size: 8, color: '#ffcc22' },
  { id: 'chain', name: 'Chain Client', size: 9, color: '#7744ff' },
  { id: 'queue', name: 'Queue Engine', size: 8, color: '#ff6622' },
  { id: 'solver', name: 'Sovereign Solver', size: 8, color: '#cc44ff' },
  { id: 'security', name: 'Security', size: 7, color: '#ff2244' },
  { id: 'api', name: 'API PORT', size: 12, color: '#00ffdd', isApi: true },
  { id: 'monitor', name: 'Monitor', size: 7, color: '#44ccff' },
  { id: 'storage', name: 'Storage', size: 7, color: '#88ff88' },
  { id: 'dashboard', name: 'Dashboard', size: 8, color: '#ff88ff' },
  { id: 'config', name: 'Config', size: 6, color: '#cccccc' },
  { id: 'utils', name: 'Utils', size: 6, color: '#aaaaaa' },
];

const links = [];
const coreId = 'core';
modules.forEach(m => { if (m.id !== coreId) links.push({ from: coreId, to: m.id }); });

const sphereRadius = 9;
const nodeObjMap = {};
const lineObjMap = {};

// 创建节点
modules.forEach(mod => {
  const g = new THREE.SphereGeometry(mod.size/4, 24,16);
  const mat = new THREE.MeshBasicMaterial({
    color: mod.color, transparent: true, opacity: 0.92
  });
  const mesh = new THREE.Mesh(g, mat);
  mesh.userData = mod;

  if (mod.isCore) {
    mesh.position.set(0,0,0);
  } else {
    const phi = Math.random() * Math.PI * 2;
    const costheta = Math.random() * 2 - 1;
    const theta = Math.acos(costheta);
    mesh.position.set(
      sphereRadius * Math.sin(theta)*Math.cos(phi),
      sphereRadius * Math.sin(theta)*Math.sin(phi),
      sphereRadius * Math.cos(theta)
    );
  }
  scene.add(mesh);
  nodeObjMap[mod.id] = mesh;
});

// 创建连线
links.forEach(link => {
  const n1 = nodeObjMap[link.from];
  const n2 = nodeObjMap[link.to];
  const points = [n1.position, n2.position];
  const g = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: '#00ffff', transparent: true, opacity: 0.4
  });
  const line = new THREE.Line(g, mat);
  scene.add(line);
  lineObjMap[`${link.from}-${link.to}`] = line;
});

// 全局流光脉冲
function pulseAllLinks() {
  const duration = 1500;
  links.forEach(link => {
    const line = lineObjMap[`${link.from}-${link.to}`];
    if (!line) return;
    const t0 = performance.now();
    function anim() {
      const t = Math.min(1, (performance.now() - t0) / duration);
      line.material.opacity = 0.2 + 0.8 * Math.sin(t * Math.PI);
      if (t < 1) requestAnimationFrame(anim);
      else line.material.opacity = 0.4;
    }
    anim();
  });
}
setInterval(pulseAllLinks, 5000);
pulseAllLinks();

// 点击检测
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('pointerdown', (e) => {
  mouse.x = (e.clientX/window.innerWidth)*2 -1;
  mouse.y = -(e.clientY/window.innerHeight)*2 +1;
  raycaster.setFromCamera(mouse, camera);
  const arr = Object.values(nodeObjMap);
  const intersects = raycaster.intersectObjects(arr);
  if (intersects.length) {
    const d = intersects[0].object.userData;
    alert('Module: ' + d.name);
  }
});

// 悬浮提示
window.addEventListener('pointermove', (e) => {
  mouse.x = (e.clientX/window.innerWidth)*2 -1;
  mouse.y = -(e.clientY/window.innerHeight)*2 +1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(Object.values(nodeObjMap));
  if (intersects.length) {
    const d = intersects[0].object.userData;
    tooltip.style.display = 'block';
    tooltip.style.left = e.clientX + 10 + 'px';
    tooltip.style.top = e.clientY + 10 + 'px';
    tooltip.innerText = d.name;
  } else {
    tooltip.style.display = 'none';
  }
});

// 动画循环
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
}
animate();

// 自适应
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
