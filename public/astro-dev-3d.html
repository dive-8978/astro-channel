<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroBridge Global Developer Console</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #020a1a;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    #scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #holoText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #4cc9f0;
      font-size: 28px;
      text-shadow: 0 0 15px #4cc9f0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .api-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,10,30,0.8);
      border: 1px solid #4cc9f0;
      border-radius: 10px;
      padding: 16px 20px;
      color: #fff;
      min-width: 300px;
      backdrop-filter: blur(6px);
    }
    .api-panel h3 {
      color: #4cc9f0;
      margin-bottom: 10px;
    }
    .api-item {
      margin: 8px 0;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .api-item:hover {
      background: rgba(76,201,240,0.2);
    }
  </style>
</head>
<body>

<div id="scene-container"></div>
<div id="holoText">API LINK ESTABLISHED</div>

<div class="api-panel">
  <h3>Global API Ports</h3>
  <div class="api-item" onclick="goApi('/api/v1/nodes')">API: Node Status • Port 8080</div>
  <div class="api-item" onclick="goApi('/api/v1/bridge')">API: AstroBridge • Port 8081</div>
  <div class="api-item" onclick="goApi('/api/v1/chain')">API: Chain Sync • Port 8082</div>
  <div class="api-item" onclick="goApi('/api/v1/dev')">API: Developer Center • Port 8090</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let earthMesh = null;
let beams = [];
const holoText = document.getElementById('holoText');

const planets = [
  { name: 'Sun', radius: 5, color: 0xffcc00, x: 0 },
  { name: 'Mercury', radius: 0.8, color: 0xaaaaaa, x: 8 },
  { name: 'Venus', radius: 1.2, color: 0xeec86f, x: 11 },
  { name: 'Earth', radius: 1.3, color: 0x4499ff, x: 14 },
  { name: 'Mars', radius: 1.0, color: 0xff6633, x: 17 }
];

const apiPositions = [
  new THREE.Vector3(-20, 15, 0),
  new THREE.Vector3(20, 15, 0),
  new THREE.Vector3(-25, 5, 10),
  new THREE.Vector3(25, 5, -10)
];

function init() {
  const container = document.getElementById('scene-container');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000211);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 15, 35);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 15;
  controls.maxDistance = 100;

  // Stars
  const stars = [];
  for (let i = 0; i < 2000; i++) {
    stars.push(
      (Math.random() - 0.5) * 2000,
      (Math.random() - 0.5) * 2000,
      (Math.random() - 0.5) * 2000
    );
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Planets + orbits
  planets.forEach(p => {
    const geo = new THREE.SphereGeometry(p.radius, 32, 32);
    const mat = new THREE.MeshBasicMaterial({ color: p.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = p.x;
    mesh.userData.name = p.name;
    scene.add(mesh);
    if (p.name === 'Earth') earthMesh = mesh;

    if (p.name !== 'Sun') {
      const points = [];
      for (let i = 0; i <= 100; i++) {
        const a = (i / 100) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a) * p.x, 0, Math.sin(a) * p.x));
      }
      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      const lineMat = new THREE.LineBasicMaterial({
        color: p.color,
        transparent: true,
        opacity: 0.25
      });
      scene.add(new THREE.Line(lineGeo, lineMat));
    }
  });

  window.addEventListener('click', onMouseClick);
  animate();
  setInterval(fireBeam, 3200);
}

function onMouseClick(e) {
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(scene.children);
  for (const item of intersects) {
    if (item.object.userData.name === 'Earth') {
      flyToEarth();
      setTimeout(() => {
        alert('Developer Center: https://yourdomain.com/dev');
      }, 1600);
      return;
    }
  }
}

function flyToEarth() {
  const target = earthMesh.position.clone().add(new THREE.Vector3(0, 2, 5));
  const start = camera.position.clone();
  const startT = Date.now();
  function update() {
    const t = Math.min(1, (Date.now() - startT) / 1600);
    camera.position.lerpVectors(start, target, t);
    camera.lookAt(earthMesh.position);
    if (t < 1) requestAnimationFrame(update);
  }
  update();
}

function fireBeam() {
  const color = 0x4cc9f0;
  const group = [];
  apiPositions.forEach(pos => {
    const geo = new THREE.BufferGeometry().setFromPoints([
      pos.clone(),
      earthMesh.position.clone()
    ]);
    const mat = new THREE.LineBasicMaterial({
      color,
      transparent: true,
      opacity: 0.8
    });
    const beam = new THREE.Line(geo, mat);
    scene.add(beam);
    group.push(beam);
  });
  beams.push(...group);
  holoText.style.opacity = 1;
  setTimeout(() => { holoText.style.opacity = 0; }, 1200);
  setTimeout(() => {
    group.forEach(b => scene.remove(b));
  }, 1200);
}

window.goApi = function (path) {
  holoText.style.opacity = 1;
  setTimeout(() => { holoText.style.opacity = 0; }, 1000);
  alert(`Open API: ${path}\nGlobal Port: 8080-8099`);
};

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

init();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
