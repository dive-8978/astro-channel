<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  let scene, camera, renderer, controls;
  let earthMesh = null, beams = [];
  const holoText = document.getElementById('holoText');

  const planets = [
    {name:'Sun', radius:5, color:0xffcc00, x:0},
    {name:'Mercury', radius:0.8, color:0xaaaaaa, x:8},
    {name:'Venus', radius:1.2, color:0xeec86f, x:11},
    {name:'Earth', radius:1.3, color:0x4499ff, x:14},
    {name:'Mars', radius:1.0, color:0xff6633, x:17}
  ];

  let apiPositions = [];

  function init() {
    const container = document.getElementById('scene-container');
    scene = new THREE.Scene();
    // 加背景色，便于确认是否渲染（可选，调试用）
    scene.background = new THREE.Color(0x000022);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 35);  // 稍微拉近一点，方便看到

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 15;
    controls.maxDistance = 100;

    // 星空
    const stars = [];
    for (let i = 0; i < 2000; i++) {
      stars.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 })));

    planets.forEach(p => {
      const geo = new THREE.SphereGeometry(p.radius, 32, 32);
      const mat = new THREE.MeshBasicMaterial({ color: p.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.x = p.x;
      mesh.userData = { name: p.name };
      scene.add(mesh);
      if (p.name === 'Earth') earthMesh = mesh;

      if (p.name !== 'Sun') {
        const points = [];
        for (let i = 0; i <= 100; i++) {
          const angle = (i / 100) * 2 * Math.PI;
          points.push(new THREE.Vector3(Math.cos(angle) * p.x, 0, Math.sin(angle) * p.x));
        }
        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(points),
          new THREE.LineBasicMaterial({ color: p.color, transparent: true, opacity: 0.3 })
        ));
      }
    });

    apiPositions = [
      new THREE.Vector3(-20, 15, 0),
      new THREE.Vector3(20, 15, 0),
      new THREE.Vector3(-25, 5, 10),
      new THREE.Vector3(25, 5, -10)
    ];

    window.addEventListener('click', onMouseClick);
    animate();
    setInterval(fireBeam, 3000);
  }

  // 其他函数保持不变：onMouseClick, flyToEarth, fireBeam, goApi, animate

  function onMouseClick(e) {
    const mouse = new THREE.Vector2(
      (e.clientX / window.innerWidth) * 2 - 1,
      -(e.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children);
    for (let item of intersects) {
      if (item.object.userData.name === 'Earth') {
        flyToEarth();
        setTimeout(() => { alert('Developer Center (replace with your link)'); }, 1500);
        return;
      }
    }
  }

  function flyToEarth() {
    const targetPos = earthMesh.position.clone().add(new THREE.Vector3(0, 2, 5));
    const start = camera.position.clone();
    const startTime = Date.now();
    function update() {
      const t = Math.min(1, (Date.now() - startTime) / 1500);
      camera.position.lerpVectors(start, targetPos, t);
      camera.lookAt(earthMesh.position);
      if (t < 1) requestAnimationFrame(update);
    }
    update();
  }

  function fireBeam() {
    const color = 0x4cc9f0;
    const beamsThisRound = [];
    apiPositions.forEach(pos => {
      const geom = new THREE.BufferGeometry().setFromPoints([pos.clone(), earthMesh.position.clone()]);
      const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.8 }));
      scene.add(line);
      beamsThisRound.push(line);
    });
    beams.push(...beamsThisRound);
    holoText.style.opacity = 1;
    setTimeout(() => { holoText.style.opacity = 0; }, 1200);
    setTimeout(() => beamsThisRound.forEach(l => scene.remove(l)), 1200);
  }

  function goApi(path) { alert('Navigate to ' + path); }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  init();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
