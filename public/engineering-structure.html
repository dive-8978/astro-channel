<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge Engineering Structure</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif
}

body{
background:#020112;
color:white;
overflow:hidden;
}

#space{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:0;
}

/* Home */
.home-btn{
position:absolute;
top:15px;
left:15px;
padding:6px 12px;
border-radius:16px;
text-decoration:none;
font-size:12px;
color:#4cc9f0;
border:1px solid #4cc9f0;
background:rgba(10,30,60,0.6);
box-shadow:0 0 8px rgba(76,201,240,0.6);
z-index:3;
}

/* Title */

.title{
position:absolute;
top:18px;
left:50%;
transform:translateX(-50%);
font-size:1.6rem;
font-weight:800;
text-shadow:0 0 10px #4cc9f0,0 0 20px #f72585;
z-index:3;
}

/* Node */

.node{
position:absolute;
width:140px;
padding:10px;
background:rgba(10,30,60,0.8);
border:1px solid rgba(76,201,240,0.4);
border-radius:10px;
text-align:center;
font-size:12px;
cursor:pointer;
transform:translate(-50%,-50%);
transition:0.25s;
z-index:3;
}

.node:hover{
transform:translate(-50%,-50%) scale(1.1);
box-shadow:0 0 12px #4cc9f0,0 0 20px #f72585;
}

/* Tooltip */

.tooltip{
position:absolute;
background:black;
padding:6px 10px;
border-radius:5px;
font-size:11px;
color:#4cc9f0;
pointer-events:none;
opacity:0;
transition:0.2s;
z-index:5;
max-width:200px;
}

/* center */

.center-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:3rem;
font-weight:900;
text-shadow:0 0 20px #4cc9f0,0 0 40px #f72585;
opacity:0;
z-index:4;
animation:flash 1.5s infinite alternate;
}

@keyframes flash{
0%{opacity:0.3}
100%{opacity:1}
}

/* radar */

.radar-circle{
position:absolute;
border:2px solid #4cc9f0;
border-radius:50%;
animation:radar 3s linear infinite;
opacity:0.4;
}

@keyframes radar{
0%{transform:translate(-50%,-50%) scale(0.3)}
100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}
}

/* mobile */

@media(max-width:768px){

.node{
width:120px;
font-size:11px;
}

.center-text{
font-size:2rem;
}

.title{
font-size:1.2rem;
}

}

</style>
</head>

<body>

<canvas id="space"></canvas>

<a href="index.html" class="home-btn">← Home</a>

<div class="title">ASTROBRIDGE ENGINEERING STRUCTURE</div>

<div class="tooltip" id="tooltip"></div>

<div class="center-text" id="centerText">ASTROBRIDGE</div>

<div class="radar-circle" style="top:50%;left:50%;width:120px;height:120px;"></div>


<!-- nodes -->

<div class="node" data-tooltip="System entry point + self-maintenance tasks">index.ts</div>

<div class="node" data-tooltip="Global AI orchestrator + automatic maintenance">AiOrchestrator.ts</div>

<div class="node" data-tooltip="AI risk monitoring + threshold management">AiRiskEngine.ts</div>

<div class="node" data-tooltip="Global chain client + RPC pool management">EvmChainClient.ts</div>

<div class="node" data-tooltip="Decentralized solver for autonomous execution">SovereignSolver.ts</div>

<div class="node" data-tooltip="Robot lifecycle and cluster management">Robot.ts</div>


<script>

/* canvas */

const canvas=document.getElementById("space")
const ctx=canvas.getContext("2d")

let w=canvas.width=window.innerWidth
let h=canvas.height=window.innerHeight

window.addEventListener("resize",()=>{
w=canvas.width=window.innerWidth
h=canvas.height=window.innerHeight
layoutNodes()
})

/* particles */

class Particle{

constructor(){

this.x=Math.random()*w
this.y=Math.random()*h

this.vx=(Math.random()-0.5)*0.3
this.vy=(Math.random()-0.5)*0.3

this.size=Math.random()*1.5

this.color=Math.random()>0.5?"#4cc9f0":"#f72585"

}

update(){

this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>w)this.vx*=-1
if(this.y<0||this.y>h)this.vy*=-1

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fillStyle=this.color
ctx.fill()

}

}

const particles=Array.from({length:350},()=>new Particle())

function animate(){

ctx.fillStyle="rgba(2,6,23,0.3)"
ctx.fillRect(0,0,w,h)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)

}

animate()

/* nodes */

const nodes=document.querySelectorAll(".node")

function layoutNodes(){

const mobile=window.innerWidth<768

if(mobile){

const cols=2

const gapX=window.innerWidth/(cols+1)
const gapY=110

nodes.forEach((node,i)=>{

const col=i%cols
const row=Math.floor(i/cols)

node.style.left=gapX*(col+1)+"px"
node.style.top=(120+row*gapY)+"px"

})

}

else{

const centerX=w/2
const centerY=h/2

const radius=Math.min(w,h)*0.35

const step=(Math.PI*2)/nodes.length

nodes.forEach((node,i)=>{

const angle=i*step

let x=centerX+radius*Math.cos(angle)
let y=centerY+radius*Math.sin(angle)

node.style.left=x+"px"
node.style.top=y+"px"

})

}

}

layoutNodes()

/* tooltip */

const tooltip=document.getElementById("tooltip")

nodes.forEach(node=>{

node.addEventListener("mousemove",e=>{

tooltip.innerText=node.dataset.tooltip

let x=e.pageX+15
let y=e.pageY+15

if(x+200>window.innerWidth)x=window.innerWidth-200
if(y+40>window.innerHeight)y=window.innerHeight-40

tooltip.style.left=x+"px"
tooltip.style.top=y+"px"
tooltip.style.opacity=1

})

node.addEventListener("mouseleave",()=>{
tooltip.style.opacity=0
})

})

/* beam animation */

const centerText=document.getElementById("centerText")

function fireBeams(){

const beams=[]

nodes.forEach(node=>{

const r=node.getBoundingClientRect()

const startX=r.left+r.width/2
const startY=r.top+r.height/2

beams.push({
x:startX,
y:startY,
dx:(w/2-startX)/60,
dy:(h/2-startY)/60,
count:0
})

})

const anim=setInterval(()=>{

ctx.fillStyle="rgba(2,6,23,0.3)"
ctx.fillRect(0,0,w,h)

particles.forEach(p=>{
p.update()
p.draw()
})

let done=true

beams.forEach(b=>{

if(b.count<60){

done=false

ctx.beginPath()
ctx.strokeStyle="#4cc9f0"
ctx.lineWidth=2

ctx.moveTo(b.x,b.y)

b.x+=b.dx
b.y+=b.dy

ctx.lineTo(b.x,b.y)

ctx.stroke()

b.count++

}

})

if(done){

clearInterval(anim)

centerText.style.opacity=1

}

},16)

}

setInterval(()=>{

centerText.style.opacity=0
fireBeams()

},4000)

</script>

</body>
</html>
