<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge - System Wall 1.0 → 7.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  background:#000;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* 背景粒子 */
.particles {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  z-index:0;
  pointer-events:none;
}

/* 墙容器 */
.wall-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  height: 60%;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 8px;
  z-index: 1;
}

/* 墙砖样式 */
.brick {
  border-radius: 6px;
  border: 1px solid rgba(76,201,240,0.6);
  opacity:1;
  transition: all 0.5s ease;
}

/* 完成砖块 */
.brick.completed {
  background: linear-gradient(135deg,#0ea5e9,#4cc9f0);
  box-shadow: 0 0 25px rgba(76,201,240,0.7);
  animation: flicker 3s infinite;
}

/* 待完成砖块 */
.brick.pending {
  background: rgba(76,201,240,0.1);
  box-shadow: 0 0 10px rgba(76,201,240,0.3);
  opacity:0.3;
  animation: pulse 2s infinite alternate;
}

/* 未来目标砖块 */
.brick.future {
  background: rgba(76,201,240,0.05);
  border: 1px solid rgba(76,201,240,0.1);
  opacity:0.15;
}

@keyframes flicker {
  0%,100%{opacity:1;}
  50%{opacity:0.7;}
}
@keyframes pulse {
  0%{opacity:0.3;}
  100%{opacity:0.6;}
}

/* 工人漂浮 */
.worker {
  position: fixed;
  z-index: 3;
  width: 130px;
  height: 200px;
  opacity: 0.5;
  filter: drop-shadow(0 0 25px #4cc9f0);
  pointer-events: none;
  animation: float 3s ease-in-out infinite alternate;
}
@keyframes float {
  0%{transform: translateY(0);}
  100%{transform: translateY(-20px);}
}

/* 中间文字 */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:20px;
}
.title{
  font-size:4rem;
  font-weight:800;
  background:linear-gradient(135deg,#0ea5e9,#4cc9f0,#bae6fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(76,201,240,0.6);
  animation: glow 2s infinite alternate;
}
.version{
  font-size:2rem;
  font-weight:800;
  color:#4cc9f0;
  margin:10px 0;
  text-shadow:0 0 30px rgba(76,201,240,1);
}
.days{
  font-size:3.5rem;
  font-weight:800;
  background:linear-gradient(135deg,#0ea5e9,#4cc9f0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:10px 0;
  text-shadow:0 0 20px rgba(76,201,240,0.8);
  animation: pulse 1.5s infinite alternate;
}
.hms{
  font-size:1.5rem;
  font-weight:700;
  color:#4cc9f0;
  text-shadow:0 0 15px rgba(76,201,240,0.7);
}
.progress-bar {
  width: 60%;
  height: 16px;
  background: rgba(76,201,240,0.2);
  border-radius: 8px;
  margin: 10px auto;
  overflow: hidden;
}
.progress {
  height:100%;
  width:0%;
  background: linear-gradient(135deg,#0ea5e9,#4cc9f0);
  border-radius:8px;
  transition: width 0.5s;
}
@keyframes glow {
  0%{text-shadow:0 0 20px rgba(76,201,240,0.6);}
  100%{text-shadow:0 0 40px rgba(76,201,240,1);}
}

/* 返回按钮 */
.back-home{
  position:fixed;
  top:30px;
  left:30px;
  z-index:10;
  color:#4cc9f0;
  font-weight:600;
  text-decoration:none;
  padding:10px 18px;
  border:1px solid #4cc9f0;
  border-radius:10px;
  background:rgba(76,201,240,0.1);
  transition:0.2s;
}
.back-home:hover{
  background:#4cc9f0;
  color:#000;
}

@media(max-width:768px){
  .title{font-size:2.4rem}
  .days{font-size:2.2rem}
  .version{font-size:1.4rem}
}
</style>
</head>
<body>

<a href="index.html" class="back-home">← Back to Home</a>

<div class="wall-container" id="wall"></div>

<!-- 透明工人 -->
<svg class="worker" viewBox="0 0 120 200">
  <circle cx="60" cy="50" r="28" fill="#4cc9f0" opacity="0.6"/>
  <rect x="48" y="80" width="24" height="70" fill="#4cc9f0" opacity="0.5"/>
  <line x1="60" y1="150" x2="60" y2="180" stroke="#4cc9f0" stroke-width="6" opacity="0.7"/>
  <line x1="42" y1="110" x2="20" y2="140" stroke="#4cc9f0" stroke-width="5" opacity="0.7"/>
  <line x1="78" y1="110" x2="100" y2="140" stroke="#4cc9f0" stroke-width="5" opacity="0.7"/>
</svg>

<div class="container">
  <h1 class="title">AstroBridge</h1>
  <div class="version">System Wall 3.0 / 7.0</div>
  <div class="days" id="days">365</div>
  <div class="hms" id="hms">00:00:00</div>
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
  <div style="margin-top:20px; font-size:1.2rem; opacity:0.8">
    Building the full wall from bottom to top
  </div>
</div>

<canvas class="particles" id="particles"></canvas>

<script>
// 初始化砖块
const wall = document.getElementById('wall');
const totalRows = 8;
const totalCols = 10;
const currentVersion = 3.0;
const maxVersion = 7.0;
const progressRatio = currentVersion / maxVersion;
const bricks = [];

for(let r=0;r<totalRows;r++){
  for(let c=0;c<totalCols;c++){
    const div = document.createElement('div');
    div.classList.add('brick','future'); // 默认未来砖块
    wall.appendChild(div);
    bricks.push({el:div,row:r});
  }
}

// 动态砌墙
function buildWall(){
  const totalBricks = Math.floor(bricks.length * progressRatio);
  let index = 0;
  const interval = setInterval(()=>{
    if(index >= totalBricks){
      clearInterval(interval);
      return;
    }
    const rowIndex = Math.floor(index / totalCols);
    const colIndex = index % totalCols;
    const r = totalRows - 1 - rowIndex;
    const c = colIndex;
    const brick = bricks[r*totalCols + c];
    brick.el.classList.remove('future');
    brick.el.classList.add('completed');
    index++;
    // 更新进度条
    document.getElementById('progress').style.width = Math.floor(index/bricks.length*100)+'%';
  }, 120);
}
buildWall();

// 倒计时
const daysEl = document.getElementById("days");
const hmsEl = document.getElementById("hms");
const target = new Date("2027-02-18T00:00:00+08:00");
const pad = n => String(n).padStart(2,"0");
function tick(){
  const now = new Date();
  const diff = target - now;
  if(diff<=0){
    daysEl.innerText="000";
    hmsEl.innerText="00:00:00";
    return;
  }
  const s=Math.floor(diff/1000);
  const d=Math.floor(s/86400);
  const h=Math.floor((s%86400)/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;
  daysEl.innerText=d;
  hmsEl.innerText=`${pad(h)}:${pad(m)}:${pad(sec)}`;
}
tick(); setInterval(tick,1000);

// 粒子效果
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let w=canvas.width=window.innerWidth;
let h=canvas.height=window.innerHeight;
const particles=[];
for(let i=0;i<120;i++){
  particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,speed:Math.random()*0.5+0.2});
}
function drawParticles(){
  ctx.clearRect(0,0,w,h);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(76,201,240,0.3)';
    ctx.fill();
    p.y-=p.speed;
    if(p.y<0)p.y=h;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener('resize',()=>{
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
});
</script>

</body>
</html>
