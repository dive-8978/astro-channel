<!DOCTYPE html>

<head>

  <title>AstroBridge | Mini Swap + Side Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'genesis-blue': '#40c4ff',
            'genesis-purple': '#7c4dff',
            'void-black': '#02000d',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    body{background:#02000d;min-height:100vh;position:relative;overflow-x:hidden;}
    /* 全屏悬浮粒子背景 */
    #particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    /* 高透高亮立体玻璃升级，立体感+强光外发光 */
    .glass-sm{
      background:rgba(8,15,40,0.25);
      backdrop-filter:blur(20px);
      border:1px solid rgba(64,196,255,0.45);
      border-radius:1.2rem;
      box-shadow: 0 0 25px rgba(64,196,255,0.35), 
                  inset 0 0 15px rgba(64,196,255,0.15);
      transform:translateZ(8px);
    }
    .btn-swap{
      background:linear-gradient(135deg,#40c4ff,#7c4dff);
      box-shadow:0 0 20px rgba(64,196,255,0.6);
      border-radius:0.8rem;
    }
    .btn-swap:hover{
      box-shadow:0 0 40px rgba(64,196,255,0.9);
      transform:scale(1.03) translateZ(12px);
    }
    .side-dash{width:280px;max-height:90vh;}
    .num-live{animation:pulse-num 1.2s infinite;}
    @keyframes pulse-num{0%,100%{opacity:1;}50%{opacity:0.7;}}
    /* 粒子闪烁动画 */
    @keyframes particle-float{
      0%{transform:translateY(0) translateX(0);opacity:0.2;}
      50%{transform:translateY(-15px) translateX(8px);opacity:0.8;}
      100%{transform:translateY(0) translateX(0);opacity:0.2;}
    }
    .particle{
      position:absolute;background:#40c4ff;border-radius:50%;
      animation:particle-float 6s ease-in-out infinite;
    }
  </style>
</head>

    <div class="flex gap-2">

        <option value="369">PulseChain</option>
        <option value="222222">KCC KuCoin</option>
        <option value="122">Fuse Network</option>
        <option value="820">Callisto</option>
        <option value="30">Rootstock RSK</option>
        <option value="61">Ethereum Classic</option>
        <option value="100">Gnosis Chain</option>
        <option value="131316">Aurora</option>
        <option value="288">Boba Network</option>
        <option value="77">Nova Network</option>
        <option value="9001">Metis Andromeda</option>
        <option value="112">Heco Chain</option>
        <option value="40">Telos EVM</option>
        <option value="108">ThunderCore</option>
        <option value="88">Tomochain</option>
        <option value="16">Clover EVM</option>
        <option value="19">Songbird</option>

<!-- 右侧高亮立体仪表盘 -->
<div class="glass-sm side-dash p-4 sticky top-6">
  <div class="flex items-center justify-center gap-2 mb-4 border-b border-genesis-blue/30 pb-2">
    < img src="/public/favicon.ico" alt="Logo" class="h-5 w-5">
    <h2 class="text-base font-orbitron text-genesis-blue">Live Dashboard</h2>
  </div>
  
  <div class="space-y-4 text-sm">
    <div class="flex justify-between"><span class="text-gray-200">Health Nodes</span><span id="liveNodes" class="text-green-400 num-live font-orbitron">180</span></div>
    <div class="flex justify-between"><span class="text-gray-200">Queue Waiting</span><span id="liveQueue" class="text-genesis-blue font-orbitron">0</span></div>
    <div class="flex justify-between"><span class="text-gray-200">Success Rate</span><span id="liveRate" class="text-green-400 font-orbitron">0.00%</span></div>
  </div>

  <div class="mt-4 pt-3 border-t border-genesis-blue/30">
    <p class="text-xs text-gray-200 mb-2">Recent Tx Hash</p >
    <div id="txRoll" class="text-xs font-mono text-gray-100 max-h-32 overflow-y-auto break-all"></div>
  </div>
</div>

<script>
// 自动生成全屏悬浮科幻粒子
(function createParticles(){
  const wrap = document.getElementById('particles');
  const count = 94;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className='particle';
    let s = Math.random()*4+1;
    p.style.width = s+'px';p.style.height=s+'px';
    p.style.left = Math.random()*100+'%';
    p.style.top = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*6+'s';
    wrap.appendChild(p);
  }
})();

let userAddress = null, web3Provider = null;
const miniLog = document.getElementById('miniLog');
const API_BASE = "http://45.76.150.100:3000";
function logTxt(s){miniLog.innerHTML += `> ${s}\n`;miniLog.scrollTop=miniLog.scrollHeight;}

document.getElementById('connBtn').onclick = async ()=>{
  if(!window.ethereum) return logTxt("No wallet detected");
  web3Provider = new ethers.providers.Web3Provider(window.ethereum);
  await window.ethereum.request({method:'eth_requestAccounts'});
  const signer = web3Provider.getSigner();
  userAddress = await signer.getAddress();
  document.getElementById('connBtn').innerText = userAddress.slice(0,6)+"...";
  document.getElementById('sendBtn').disabled = false;
  logTxt("Wallet connected: "+userAddress.slice(0,10)+"...");
};

document.getElementById('sendBtn').onclick = async ()=>{
  if(!userAddress)return;
  logTxt("Requesting signature...");
  try{
    const sig = await web3Provider.getSigner().signMessage("AstroMini "+Date.now());
    logTxt("Signature done, submitting...");
    await fetch(`${API_BASE}/api/intent/submit`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({from:userAddress,sig:sig,simpleCross:true})
    });
    logTxt("Tx queued on network");
  }catch(e){logTxt("Fail: "+e.message.slice(0,25))}
};

async function refreshSideDash(){
  try{
    const res = await fetch(`${API_BASE}/api/metrics`);
    const d = await res.json();
    if(d.success){
      document.getElementById('liveNodes').innerText = d.nodesHealthy||180;
      document.getElementById('liveQueue').innerText = d.queue?.waiting||0;
      document.getElementById('liveRate').innerText = d.successRate||"0.00%";
    }
  }catch(e){}
}
setInterval(refreshSideDash,3000);refreshSideDash();

document.getElementById('txRoll').innerHTML += 
`${Date.now().toString(16)} | 0x4d328818d5eea28c178627e3feee3a42275a33149f7e07423017dd3dc2c3b2ab\n`;
logTxt("Mini Swap + Side Dashboard Ready");
</script>
