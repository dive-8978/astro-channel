<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroBridge • Genesis Terminal</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'genesis-blue': '#00f0ff',
            'genesis-purple': '#8b00ff',
            'void-black': '#000814',
            'star-gold': '#ffd700',
            'nebula-teal': '#00fff5',
          },
          fontFamily: {
            'orbitron': ['Orbitron', 'sans-serif'],
            'exo': ['Exo 2', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-ui-dist/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom, #000814, #0a001f);
      background-image: url('https://cdn.esawebb.org/archives/images/publicationjpg/pillars_of_creation_composite.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e0f7ff;
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
      position: relative;
      margin: 0;
      padding: 0;
      height: 100vh;
    }

    /* 星云背景动画层 - 多层渐变云团缓慢流动 */
    .nebula-clouds {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background: 
        radial-gradient(circle at 25% 35%, rgba(139, 92, 246, 0.28) 10%, transparent 50%),
        radial-gradient(circle at 75% 55%, rgba(34, 211, 238, 0.25) 15%, transparent 55%),
        radial-gradient(circle at 45% 85%, rgba(249, 115, 22, 0.18) 8%, transparent 50%),
        radial-gradient(circle at 90% 20%, rgba(168, 85, 247, 0.22) 12%, transparent 60%);
      background-size: 180% 180%, 220% 220%, 160% 160%, 200% 200%;
      background-position: 0% 0%, 30% 70%, 80% 20%, 50% 90%;
      animation: 
        nebula1 280s ease-in-out infinite,
        nebula2 340s ease-in-out infinite reverse,
        nebula3 420s ease-in-out infinite;
      filter: blur(45px) brightness(1.15);
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    @keyframes nebula1 { 0%,100% { background-position: 0% 0%;   } 50% { background-position: 120% 120%; } }
    @keyframes nebula2 { 0%,100% { background-position: 30% 70%; } 50% { background-position: -60% -40%; } }
    @keyframes nebula3 { 0%,100% { background-position: 80% 20%; } 50% { background-position: 160% 110%; } }

    /* 星尘容器 + 层 */
    .stars-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    .stars-layer {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    /* 彗星层 */
    .comets-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .comet {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle at 30% 30%, #fff, #a5f3ff 40%, transparent 70%);
      border-radius: 50%;
      box-shadow: 0 0 12px 4px #a5f3ff, 0 0 30px 10px #60a5fa;
      opacity: 0;
    }

    .comet::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 100%;
      height: 2.5px;
      background: linear-gradient(to right, #a5f3ff, #60a5fa, transparent);
      transform: translateY(-50%);
      opacity: 0.75;
      filter: blur(1.8px);
      width: var(--tail, 140px);
    }

    @keyframes comet-move {
      0%   { transform: translate(0,0) rotate(var(--angle)); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(180vw, 120vh) rotate(var(--angle)); opacity: 0; }
    }

    /* 玻璃面板 & neon 效果 */
    .glass-panel {
      background: rgba(10, 15, 40, 0.38);
      backdrop-filter: blur(18px) saturate(190%);
      border: 1px solid rgba(0, 240, 255, 0.22);
      box-shadow: 0 10px 40px rgba(0, 240, 255, 0.15);
      border-radius: 1.2rem;
      transition: all 0.4s ease;
    }

    .glass-panel:hover {
      border-color: rgba(0, 240, 255, 0.45);
      box-shadow: 0 15px 50px rgba(0, 240, 255, 0.25);
    }

    .neon-text {
      text-shadow: 0 0 12px #00f0ff, 0 0 24px #00f0ff, 0 0 48px #8b00ff;
    }

    .btn-neon {
      background: linear-gradient(45deg, #00f0ff, #8b00ff);
      border: none;
      box-shadow: 0 0 24px rgba(0,240,255,0.6);
      transition: all 0.35s;
    }

    .btn-neon:hover {
      box-shadow: 0 0 48px rgba(0,240,255,0.9), 0 0 70px rgba(139,0,255,0.7);
      transform: translateY(-3px) scale(1.02);
    }

    .price-flash { animation: neon-flash 1.3s ease-out; }
    @keyframes neon-flash {
      0%,100% { text-shadow: 0 0 10px #00f0ff; }
      50%  { text-shadow: 0 0 25px #00f0ff, 0 0 50px #00f0ff; }
    }

    .row-highlight { background: rgba(0,240,255,0.15) !important; transition: background 1.5s; }
  </style>
</head>
<body class="min-h-screen relative">

  <!-- 星云动画层 -->
  <div class="nebula-clouds"></div>

  <!-- 星尘层 -->
  <div class="stars-container">
    <div class="stars-layer" id="stars-far"></div>
    <div class="stars-layer" id="stars-mid"></div>
    <div class="stars-layer" id="stars-near"></div>
  </div>

  <!-- 彗星层 -->
  <div class="comets-layer"></div>

  <!-- NAV -->
  <nav class="glass-panel px-8 py-5 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl border-b border-genesis-blue/30">
    <div class="flex items-center gap-4">
      <h1 class="text-4xl font-orbitron font-bold neon-text tracking-wider">ASTROBRIDGE</h1>
      <span class="text-xs px-3 py-1 bg-genesis-purple/20 rounded-full border border-genesis-purple/40">GENESIS TERMINAL</span>
    </div>
    <button id="connectBtn" class="btn-neon text-white px-6 py-3 rounded-full font-semibold text-sm uppercase tracking-wider">
      <i class="fas fa-satellite-dish mr-2"></i> LINK NEURAL WALLET
    </button>
  </nav>

  <!-- TOP TICKER -->
  <div class="bg-void-black/70 border-b border-genesis-blue/20 py-3 px-8 overflow-x-auto whitespace-nowrap text-sm font-medium backdrop-blur-md">
    <div id="topTicker" class="flex gap-10"></div>
  </div>

  <!-- MAIN CONTENT (你的原有网格布局保持不变，这里简化为占位，实际可粘贴完整内容) -->
  <main class="grid md:grid-cols-4 gap-6 p-8 max-w-[1800px] mx-auto relative z-10">
    <!-- 左侧 Markets + Chart -->
    <section class="md:col-span-2 space-y-6">
      <div class="glass-panel p-6">
        <h2 class="text-2xl font-orbitron neon-text mb-4">Market Pulse</h2>
        <!-- 你的市场表格代码放这里 -->
        <p class="text-center opacity-70">实时行情数据区域（原有逻辑）</p>
      </div>
      <div class="glass-panel p-6">
        <h2 class="text-xl font-orbitron neon-text mb-4">Quantum K-Line</h2>
        <canvas id="kline" height="340"></canvas>
      </div>
    </section>

    <!-- 右侧 Swap 等 -->
    <section class="md:col-span-2 space-y-6">
      <div class="glass-panel p-8">
        <h2 class="text-2xl font-orbitron neon-text mb-6">Cross-Dimensional Swap</h2>
        <!-- 你的 Swap 面板代码放这里 -->
        <button id="swapBtn" class="btn-neon w-full py-4 rounded-xl text-lg font-bold uppercase tracking-widest mt-6">EXECUTE SWAP</button>
      </div>
      <!-- Top Gainers + Order Book 类似放这里 -->
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    // 生成随机星尘粒子
    function generateStars(layerId, count, sizeMin, sizeMax, opacity) {
      let shadows = [];
      for (let i = 0; i < count; i++) {
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = Math.random() * (sizeMax - sizeMin) + sizeMin;
        shadows.push(`${x}vw ${y}vh ${size}px #ffffff`);
      }
      document.getElementById(layerId).style.boxShadow = shadows.join(', ');
      document.getElementById(layerId).style.opacity = opacity;
    }

    generateStars('stars-far',  140, 0.6, 1.3, 0.55);
    generateStars('stars-mid',   70, 1.1, 2.2, 0.75);
    generateStars('stars-near',  25, 2.0, 4.0, 0.88);

    // 随机彗星生成
    function createComet() {
      const comet = document.createElement('div');
      comet.className = 'comet';

      const startX = Math.random() * -30 - 10;
      const startY = Math.random() * 50 - 20;
      const angle = Math.random() * 70 + 15;
      const duration = Math.random() * 9 + 7;
      const tail = Math.random() * 200 + 100;
      const delay = Math.random() * 6;

      comet.style.left = `${startX}vw`;
      comet.style.top = `${startY}vh`;
      comet.style.setProperty('--angle', `${angle}deg`);
      comet.style.setProperty('--tail', `${tail}px`);
      comet.style.animation = `comet-move ${duration}s linear ${delay}s forwards`;

      document.querySelector('.comets-layer').appendChild(comet);

      setTimeout(() => comet.remove(), (duration + delay + 2) * 1000);
    }

    // 每隔一段时间生成一颗彗星
    setInterval(createComet, 2200 + Math.random() * 2800);

    // 页面加载时先放几颗
    for (let i = 0; i < 4; i++) {
      setTimeout(createComet, i * 1200);
    }

    // 你的原有脚本逻辑（WebSocket、Chart、Swap 等）放在这里
    // 示例占位：
    $("#swapBtn").click(() => {
      alert("Quantum Swap Executed in the Nebula... (Demo)");
    });

    // ... 粘贴你之前的 Binance 数据、K线、Wallet 等完整脚本 ...
  </script>
</body>
</html>
