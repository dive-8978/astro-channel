<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroBridge • Intent Trading Terminal v3.2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #02000d;
      background-image: url('https://cdn.esawebb.org/archives/images/publicationjpg/pillars_of_creation_composite.jpg');
      background-size: cover;
      background-position: center 30%;
      background-attachment: fixed;
      color: #e3f2fd;
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    .glass-panel {
      background: rgba(8,15,40,0.65);
      backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid rgba(64,196,255,0.25);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    .neon-text { text-shadow: 0 0 12px #40c4ff, 0 0 25px #7c4dff; }
    .btn-neon {
      background: linear-gradient(135deg, #40c4ff, #7c4dff);
      transition: all 0.4s;
    }
    .btn-neon:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(64,196,255,0.85); }
    #statusLog { max-height: 300px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
<div class="glass-panel m-6 p-8 max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-5xl font-orbitron neon-text">ASTROBRIDGE</h1>
    
    <div class="flex items-center gap-6">
      <select id="languageSelect" class="bg-black/70 border border-genesis-blue/50 text-white px-5 py-2.5 rounded-2xl focus:outline-none">
        <option value="en">English</option>
        <option value="zh" selected>中文 (简体)</option>
      </select>
      
      <button id="connectBtn" class="btn-neon px-8 py-3 rounded-2xl text-white font-medium flex items-center gap-2">
        <i class="fas fa-wallet"></i> <span id="connectText">Connect Wallet</span>
      </button>
      <button id="disconnectBtn" class="hidden px-6 py-3 text-red-400 hover:text-red-300">
        <i class="fas fa-power-off"></i> <span id="disconnectText">Disconnect</span>
      </button>
    </div>
  </div>

  <div class="text-center mb-12">
    <h2 id="mainTitle" class="text-5xl font-orbitron neon-text">AI Intent Execution Terminal</h2>
    <p id="mainSubtitle" class="text-2xl mt-4 opacity-80">Speak your intent → AI parses → Robots execute on-chain</p>
  </div>

  <div class="grid lg:grid-cols-2 gap-8">
    <!-- 意图输入 -->
    <div class="glass-panel p-10">
      <h3 id="intentTitle" class="text-3xl font-orbitron mb-6 neon-text">Your Intent</h3>
      <textarea id="intentInput" rows="6" 
        class="w-full bg-black/70 border border-blue-400 rounded-3xl p-8 text-lg placeholder-gray-400 focus:outline-none focus:border-blue-500"
        placeholder="Example: Send 0.001 ETH to 0x123... on Sepolia"></textarea>

      <div class="flex gap-6 mt-10">
        <button id="parseBtn" class="btn-neon flex-1 py-5 text-xl rounded-3xl">
          <i class="fas fa-brain mr-3"></i> <span id="parseText">AI Parse Intent</span>
        </button>
        <button id="executeBtn" class="btn-neon flex-1 py-5 text-xl rounded-3xl">
          <i class="fas fa-rocket mr-3"></i> <span id="executeText">Execute Intent</span>
        </button>
      </div>
    </div>

    <!-- 执行状态 -->
    <div class="glass-panel p-10">
      <h3 id="parsedTitle" class="text-3xl font-orbitron mb-6 neon-text">AI Parsed Plan</h3>
      <div id="parsedPlan" class="min-h-[180px] bg-black/50 p-8 rounded-3xl text-lg mb-8">
        Enter your intent and click AI Parse
      </div>

      <h4 id="logTitle" class="text-2xl font-medium mb-4">Execution Log</h4>
      <div id="statusLog" class="bg-black/80 p-6 rounded-3xl text-base font-mono h-72 overflow-y-auto"></div>
    </div>
  </div>
</div>

<script>
// ==================== 多语言完整支持 ====================
const translations = {
  en: {
    mainTitle: "AI Intent Execution Terminal",
    mainSubtitle: "Speak your intent → AI parses → Robots execute on-chain",
    intentTitle: "Your Intent",
    parseText: "AI Parse Intent",
    executeText: "Execute Intent",
    parsedTitle: "AI Parsed Plan",
    logTitle: "Execution Log",
    connectText: "Connect Wallet",
    disconnectText: "Disconnect"
  },
  zh: {
    mainTitle: "AI 意图执行终端",
    mainSubtitle: "说出你的意图 → AI 解析 → 机器人链上执行",
    intentTitle: "你的意图",
    parseText: "AI 解析意图",
    executeText: "执行意图",
    parsedTitle: "AI 解析结果",
    logTitle: "执行日志",
    connectText: "连接钱包",
    disconnectText: "断开连接"
  }
};

let currentLang = 'zh';

function t(key) {
  return translations[currentLang]?.[key] || translations.en[key] || key;
}

function updateLanguage() {
  document.getElementById('mainTitle').textContent = t('mainTitle');
  document.getElementById('mainSubtitle').textContent = t('mainSubtitle');
  document.getElementById('intentTitle').textContent = t('intentTitle');
  document.getElementById('parseText').textContent = t('parseText');
  document.getElementById('executeText').textContent = t('executeText');
  document.getElementById('parsedTitle').textContent = t('parsedTitle');
  document.getElementById('logTitle').textContent = t('logTitle');
  document.getElementById('connectText').textContent = t('connectText');
  document.getElementById('disconnectText').textContent = t('disconnectText');
}

// 语言切换
document.getElementById('languageSelect').addEventListener('change', (e) => {
  currentLang = e.target.value;
  updateLanguage();
});

// ==================== 配置 & 功能 ====================
const API_BASE = "http://45.76.150.100:3000";
let userAddress = null;

const statusLog = document.getElementById('statusLog');
const parsedPlan = document.getElementById('parsedPlan');

function log(text, color = "text-gray-300") {
  const time = new Date().toLocaleTimeString();
  statusLog.innerHTML += `<p class="${color}">[${time}] ${text}</p>`;
  statusLog.scrollTop = statusLog.scrollHeight;
}

// 强化钱包连接
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (window.ethereum) {
    try {
      const provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      userAddress = await provider.getSigner().getAddress();
      document.getElementById('connectBtn').innerHTML = `✅ ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
      log(`✅ MetaMask 已连接: ${userAddress}`, "text-green-400");
      return;
    } catch (e) {}
  }

  try {
    const WalletConnectProvider = window.WalletConnectProvider.default;
    const wc = new WalletConnectProvider({ rpc: { 56: "https://bsc.llamarpc.com" } });
    await wc.enable();
    const provider = new ethers.providers.Web3Provider(wc);
    userAddress = await provider.getSigner().getAddress();
    document.getElementById('connectBtn').innerHTML = `✅ ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
    log(`✅ WalletConnect 已连接`, "text-green-400");
  } catch (e) {
    alert("钱包连接失败，请尝试 MetaMask 或其他钱包");
  }
});

document.getElementById('disconnectBtn').addEventListener('click', () => {
  userAddress = null;
  document.getElementById('connectBtn').innerHTML = `<i class="fas fa-wallet mr-2"></i> ${t('connectText')}`;
  log("钱包已断开", "text-yellow-400");
});

// AI Parse
document.getElementById('parseBtn').addEventListener('click', () => {
  const text = document.getElementById('intentInput').value.trim();
  if (!text) return alert(currentLang === 'zh' ? "请输入意图" : "Please enter your intent");
  
  parsedPlan.innerHTML = currentLang === 'zh' ? "AI 正在解析您的意图..." : "AI is analyzing your intent...";
  log(currentLang === 'zh' ? "AI 解析中..." : "AI parsing intent...", "text-blue-400");

  setTimeout(() => {
    parsedPlan.innerHTML = currentLang === 'zh' 
      ? `<strong>意图：</strong>${text}<br><strong>解析结果：</strong> Sepolia 转账<br><strong>风险评分：</strong> 低风险`
      : `<strong>Intent:</strong> ${text}<br><strong>Parsed:</strong> Transfer on Sepolia<br><strong>Risk:</strong> Low`;
    log(currentLang === 'zh' ? "AI 解析完成" : "AI parsing completed", "text-green-400");
  }, 1000);
});

// 执行意图
document.getElementById('executeBtn').addEventListener('click', async () => {
  const text = document.getElementById('intentInput').value.trim();
  if (!text) return alert(currentLang === 'zh' ? "请输入意图" : "Please enter your intent");
  if (!userAddress) return alert(currentLang === 'zh' ? "请先连接钱包" : "Please connect wallet first");

  const btn = document.getElementById('executeBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${currentLang === 'zh' ? '提交中...' : 'Submitting...'}`;

  log(currentLang === 'zh' ? "📤 正在提交意图到 AstroBridge 网络..." : "📤 Submitting intent to AstroBridge...", "text-blue-400");

  try {
    const response = await fetch(`${API_BASE}/api/intent/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        intent: {
          id: `intent_${Date.now()}`,
          type: "user_intent",
          description: text,
          creator: userAddress,
          payload: { rawIntent: text, preferredChain: "sepolia" }
        },
        signature: "user_signature_v32"
      })
    });

    const result = await response.json();

    if (result.success) {
      log(`✅ ${currentLang === 'zh' ? '意图提交成功！ID' : 'Intent submitted! ID'}: ${result.intentId}`, "text-green-400");
    } else {
      log(`❌ ${currentLang === 'zh' ? '提交失败' : 'Failed'}: ${result.error || '未知错误'}`, "text-red-400");
    }
  } catch (err) {
    log(`❌ ${currentLang === 'zh' ? '网络错误' : 'Network error'}: ${err.message}`, "text-red-400");
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
});

// 初始化
updateLanguage();
log("🚀 AstroBridge v3.2 终极多语言版已启动", "text-green-400");
</script>
</body>
</html>
