<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge | Cross-Chain Swap</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/themes/base/jquery-ui.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        astro: '#165DFF',
        dark: '#0F1116',
        darker: '#090B10',
        card: '#1A1D26',
      }
    }
  }
}
</script>

<style type="text/tailwindcss">
@layer utilities {
  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .animate-glow {
    animation: glow 3s infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 12px #165DFF33; }
    to { box-shadow: 0 0 22px #165DFF66; }
  }
}
#ui-datepicker-div {
  background: #1a1d26;
  color: white;
  border: 1px solid #333;
}
.ui-datepicker-header {
  background: #165DFF;
}
</style>
</head>

<body class="bg-dark text-gray-100 min-h-screen">

<nav class="sticky top-0 z-50 bg-darker/90 backdrop-blur-md border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="text-astro text-2xl font-bold">AstroBridge</div>
      <span class="text-xs px-2 py-1 rounded bg-astro/20 text-astro">Astronomy</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/" class="px-3 py-1.5 rounded-lg bg-astro text-white text-sm">
        <i class="fa fa-home mr-1"></i> Home
      </a>
      <button id="connectBtn" class="px-4 py-2 rounded-lg bg-astro hover:bg-astro/90 text-white font-medium">
        <i class="fa fa-link mr-1"></i> Connect Wallet
      </button>
    </div>
  </div>
</nav>

<div class="bg-card border-b border-gray-800 py-2 overflow-x-auto">
  <div class="max-w-7xl mx-auto px-4 flex gap-6 whitespace-nowrap text-sm" id="ticker">
    Loading...
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 py-10 grid md:grid-cols-3 gap-6">

  <div class="md:col-span-1 space-y-4">
    <div class="glass p-4 rounded-xl">
      <h3 class="text-lg font-bold mb-3">
        <i class="fa fa-line-chart mr-2 text-astro"></i> Market Chart
      </h3>

      <div class="flex gap-2 mb-3">
        <select id="coinSelector" class="flex-1 bg-card text-sm p-2 rounded-lg border border-gray-700">
          <option value="BTCUSDT">Bitcoin</option>
          <option value="ETHUSDT">Ethereum</option>
          <option value="BNBUSDT">BNB</option>
          <option value="SOLUSDT">Solana</option>
        </select>
        <input type="text" id="datePicker" class="flex-1 bg-card text-sm p-2 rounded-lg border border-gray-700">
      </div>

      <canvas id="priceChart" height="190"></canvas>
    </div>

    <div class="glass p-4 rounded-xl h-[340px] overflow-y-auto">
      <h3 class="text-lg font-bold mb-3">
        <i class="fa fa-bars mr-2 text-astro"></i> Top Pairs
      </h3>
      <div id="marketList"></div>
    </div>
  </div>

  <div class="md:col-span-2">
    <div class="glass p-6 rounded-2xl animate-glow">
      <h2 class="text-xl font-bold">Astronomy Cross-Chain Swap</h2>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-sm text-gray-400">From</label>
          <div class="flex gap-2">
            <select id="fromToken" class="flex-1 bg-card border p-3 rounded-lg">
              <option>ETH</option>
              <option>BTC</option>
              <option>BNB</option>
              <option>SOL</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <input id="amountIn" type="number" placeholder="0.00" class="flex-1 bg-card border p-3 rounded-lg text-right">
          </div>
        </div>

        <div class="text-center text-astro text-xl">⇅</div>

        <div>
          <label class="text-sm text-gray-400">To</label>
          <div class="flex gap-2">
            <select id="toToken" class="flex-1 bg-card border p-3 rounded-lg">
              <option>BNB</option>
              <option>ETH</option>
              <option>BTC</option>
              <option>SOL</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <input id="amountOut" readonly placeholder="0.00" class="flex-1 bg-card border p-3 rounded-lg text-right">
          </div>
        </div>

        <div class="bg-card/60 p-3 rounded-lg text-sm">
          <div class="flex justify-between">
            <span>Route</span><span id="routeAI" class="text-astro">Calculating...</span>
          </div>
        </div>

        <button id="swapBtn" class="w-full py-4 rounded-xl bg-astro text-white font-bold">
          Swap
        </button>
      </div>
    </div>
  </div>
</main>

<div id="walletModal" class="fixed inset-0 hidden items-center justify-center bg-black/80">
  <div class="glass w-full max-w-sm p-6 rounded-2xl">
    <h3 class="text-lg font-bold mb-4">Connect Wallet</h3>

    <div class="space-y-2">
      <button class="wallet w-full p-3 bg-card rounded">MetaMask</button>
      <button class="wallet w-full p-3 bg-card rounded">Coinbase Wallet</button>
      <button class="wallet w-full p-3 bg-card rounded">Trust Wallet</button>
      <button class="wallet w-full p-3 bg-card rounded">Phantom</button>
      <button class="wallet w-full p-3 bg-card rounded">OKX Wallet</button>
      <button class="wallet w-full p-3 bg-card rounded">Bitget Wallet</button>
      <button class="wallet w-full p-3 bg-card rounded">Bybit Wallet</button>
    </div>
  </div>
</div>

<script>
// Chart
const chart = new Chart(document.getElementById('priceChart'), {
  type: 'line',
  data: { labels: [], datasets: [{ data: [], borderColor: '#165DFF' }] },
  options: { plugins:{legend:false}, scales:{x:{display:false},y:{display:false}} }
});

// Datepicker
$(function(){
  $("#datePicker").datepicker({
    dateFormat:"yy-mm-dd",
    onSelect:loadKline
  });
  const today=new Date().toISOString().split('T')[0];
  $("#datePicker").val(today);
  loadKline();
});

// Kline
async function loadKline(){
  const symbol=$("#coinSelector").val();
  const date=$("#datePicker").val();
  const start=new Date(date).getTime();
  const {data}=await axios.get("https://api.binance.com/api/v3/klines",{params:{symbol,interval:"1h",startTime:start}});
  chart.data.labels=data.map(d=>new Date(d[0]).getHours()+"h");
  chart.data.datasets[0].data=data.map(d=>d[4]);
  chart.update();
}

// WebSocket FIXED
const ws = new WebSocket("wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/bnbusdt@trade/solusdt@trade");

const priceMap={};

ws.onmessage=e=>{
  const d=JSON.parse(e.data).data;
  priceMap[d.s]=parseFloat(d.p);

  const s=d.s.replace("USDT","");
  const el=document.getElementById(s);
  if(el) el.innerHTML="$"+d.p;

  calculate();
};

ws.onclose=()=>setTimeout(()=>location.reload(),2000);

// Swap calc
function calculate(){
  const amount=document.getElementById("amountIn").value;
  const from=document.getElementById("fromToken").value+"USDT";
  const to=document.getElementById("toToken").value+"USDT";

  if(!priceMap[from]||!priceMap[to]) return;

  const usd=amount*priceMap[from];
  document.getElementById("amountOut").value=(usd/priceMap[to]).toFixed(4);
}

document.addEventListener("input",e=>{
  if(e.target.id==="amountIn") calculate();
});

// Wallet
let provider, signer;

connectBtn.onclick=()=>walletModal.style.display="flex";

document.querySelectorAll(".wallet").forEach(btn=>{
  btn.onclick=async()=>{
    if(!window.ethereum) return alert("Install MetaMask");
    provider=new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer=await provider.getSigner();
    const addr=await signer.getAddress();
    connectBtn.innerText=addr.slice(0,6)+"..."+addr.slice(-4);
    walletModal.style.display="none";
  };
});

// Route AI
setInterval(()=>{
  const routes=["ETH→USDT→BNB","ETH→ARB→BNB","ETH→OP→BNB"];
  routeAI.innerText=routes[Math.floor(Math.random()*routes.length)];
},2000);

// Swap btn
swapBtn.onclick=()=>{
  if(!signer) return alert("Connect wallet");
  alert("Swap Submitted 🚀");
};

// UI init
ticker.innerHTML=`
BTC <span id="BTC"></span>
ETH <span id="ETH"></span>
BNB <span id="BNB"></span>
SOL <span id="SOL"></span>
`;

marketList.innerHTML=`
BTC/USDT <span id="MBTC"></span><br>
ETH/USDT <span id="METH"></span><br>
BNB/USDT <span id="MBNB"></span><br>
SOL/USDT <span id="MSOL"></span>
`;
</script>

</body>
</html>
