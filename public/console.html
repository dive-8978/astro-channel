<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge | Cross-Chain Swap</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        astro: '#165DFF',
        dark: '#0F1116',
        darker: '#090B10',
        card: '#1A1D26',
      }
    }
  }
}
</script>

<style type="text/tailwindcss">
@layer utilities {
  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .animate-glow {
    animation: glow 3s infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 12px #165DFF33; }
    to { box-shadow: 0 0 22px #165DFF66; }
  }
}
</style>
</head>

<body class="bg-dark text-gray-100 min-h-screen">

<!-- NAV -->
<nav class="sticky top-0 z-50 bg-darker/90 backdrop-blur-md border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="text-astro text-2xl font-bold">AstroBridge</div>
      <span class="text-xs px-2 py-1 rounded bg-astro/20 text-astro">Astronomy</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/" class="px-3 py-1.5 rounded-lg bg-astro text-white text-sm">
        <i class="fa fa-home mr-1"></i> Home
      </a>
      <button id="connectBtn" class="px-4 py-2 rounded-lg bg-astro hover:bg-astro/90 text-white font-medium">
        <i class="fa fa-link mr-1"></i> Connect Wallet
      </button>
    </div>
  </div>
</nav>

<!-- REAL-TIME TICKER -->
<div class="bg-card border-b border-gray-800 py-2 overflow-x-auto">
  <div class="max-w-7xl mx-auto px-4 flex gap-6 whitespace-nowrap text-sm" id="ticker">
    Loading real-time prices...
  </div>
</div>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-4 py-10 grid md:grid-cols-3 gap-6">

  <!-- LEFT MARKET + CHART -->
  <div class="md:col-span-1 space-y-4">
    <div class="glass p-4 rounded-xl">
      <h3 class="text-lg font-bold mb-3 flex items-center">
        <i class="fa fa-line-chart mr-2 text-astro"></i> Market Trend
      </h3>
      <canvas id="priceChart" height="180"></canvas>
    </div>
    <div class="glass p-4 rounded-xl h-[380px] overflow-y-auto scrollbar-hide">
      <h3 class="text-lg font-bold mb-3 flex items-center">
        <i class="fa fa-bars mr-2 text-astro"></i> Top Pairs
      </h3>
      <div class="space-y-2 text-sm" id="marketList">
        Loading...
      </div>
    </div>
  </div>

  <!-- SWAP PANEL -->
  <div class="md:col-span-2">
    <div class="glass p-6 rounded-2xl animate-glow">
      <h2 class="text-xl font-bold">Astronomy Cross-Chain Swap</h2>
      <p class="text-sm text-gray-400 mt-1">Non-Custodial • AI-Optimized • All-Chain</p>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-sm text-gray-400 block mb-1">From</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <select id="fromChain" class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>ETH</option>
              <option>BSC</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <select id="fromToken" class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>USDT</option>
              <option>ETH</option>
              <option>BNB</option>
              <option>MA</option>
            </select>
            <input id="fromAmount" type="number" placeholder="0.00" class="flex-2 bg-card border border-gray-700 rounded-lg p-3 text-right">
          </div>
        </div>

        <div class="flex justify-center">
          <button class="w-10 h-10 rounded-full bg-astro/20 text-astro flex items-center justify-center">
            <i class="fa fa-exchange"></i>
          </button>
        </div>

        <div>
          <label class="text-sm text-gray-400 block mb-1">To</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <select id="toChain" class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>BSC</option>
              <option>ETH</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <select id="toToken" class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>MA</option>
              <option>USDT</option>
              <option>ETH</option>
              <option>BNB</option>
            </select>
            <input id="toAmount" readonly placeholder="0.00" class="flex-2 bg-card border border-gray-700 rounded-lg p-3 text-right">
          </div>
        </div>

        <div class="bg-card/60 rounded-lg p-3 text-sm text-gray-300 space-y-1">
          <div class="flex justify-between"><span>Route</span><span class="text-astro">AstroBridge AI</span></div>
          <div class="flex justify-between"><span>Network Fee</span><span>~$0.25</span></div>
          <div class="flex justify-between"><span>Swap Time</span><span>~20s</span></div>
        </div>

        <!-- 对接你后端的真实交换按钮 -->
        <button id="swapBtn" class="w-full py-4 rounded-xl bg-astro hover:bg-astro/90 text-white font-bold text-lg">
          Swap & Cross-Chain Transfer
        </button>
      </div>
    </div>

    <div class="mt-6 grid grid-cols-3 gap-3 text-sm">
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">29+</div>
        <div class="text-xs text-gray-400">Blockchains</div>
      </div>
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">100K+</div>
        <div class="text-xs text-gray-400">Users</div>
      </div>
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">$1.4B+</div>
        <div class="text-xs text-gray-400">24h Volume</div>
      </div>
    </div>
  </div>
</main>

<!-- WALLET MODAL (ALL WALLETS SUPPORTED) -->
<div id="walletModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
  <div class="glass w-full max-w-sm mx-4 rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold">Connect Wallet</h3>
      <button id="closeModal" class="text-gray-400 hover:text-white"><i class="fa fa-times"></i></button>
    </div>
    <div class="space-y-3">
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-puzzle-piece text-xl"></i> MetaMask
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-qrcode text-xl"></i> WalletConnect (Mobile)
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-money text-xl"></i> Trust Wallet
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-star text-xl"></i> Phantom (Solana)
      </button>
    </div>
  </div>
</div>

<script>
// ==========================
// 真实价格接口（实时行情）
// ==========================
async function loadPrices() {
  const { data } = await axios.get('https://api.coingecko.com/api/v3/simple/price', {
    params: {
      ids: 'bitcoin,ethereum,binancecoin,solana,tether',
      vs_currencies: 'usd',
      include_24hr_change: true
    }
  });

  document.getElementById('ticker').innerHTML = `
    <div class="flex items-center gap-2"><span>BTC</span><span class="text-green-400">$${data.bitcoin.usd}</span><span class="text-xs">${data.bitcoin.usd_24h_change?.toFixed(2)}%</span></div>
    <div class="flex items-center gap-2"><span>ETH</span><span class="text-green-400">$${data.ethereum.usd}</span><span class="text-xs">${data.ethereum.usd_24h_change?.toFixed(2)}%</span></div>
    <div class="flex items-center gap-2"><span>BNB</span><span class="text-green-400">$${data.binancecoin.usd}</span><span class="text-xs">${data.binancecoin.usd_24h_change?.toFixed(2)}%</span></div>
    <div class="flex items-center gap-2"><span>SOL</span><span class="text-red-400">$${data.solana.usd}</span><span class="text-xs">${data.solana.usd_24h_change?.toFixed(2)}%</span></div>
    <div class="flex items-center gap-2"><span>USDT</span><span class="text-gray-300">$1.00</span></div>
    <div class="flex items-center gap-2"><span>MA</span><span class="text-astro">$0.00186</span><span class="text-xs">+5.22%</span></div>
  `;

  document.getElementById('marketList').innerHTML = `
    <div class="flex justify-between py-2 border-b border-gray-700"><span>BTC/USDT</span><span>$${data.bitcoin.usd}</span></div>
    <div class="flex justify-between py-2 border-b border-gray-700"><span>ETH/USDT</span><span>$${data.ethereum.usd}</span></div>
    <div class="flex justify-between py-2 border-b border-gray-700"><span>BNB/USDT</span><span>$${data.binancecoin.usd}</span></div>
    <div class="flex justify-between py-2 border-b border-gray-700"><span>SOL/USDT</span><span>$${data.solana.usd}</span></div>
    <div class="flex justify-between py-2 border-b border-gray-700"><span>MA/USDT</span><span class="text-astro">$0.00186</span></div>
  `;
}

// ==========================
// 图表
// ==========================
const ctx = document.getElementById('priceChart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: Array(12).fill(''),
    datasets: [{
      borderColor: '#165DFF',
      backgroundColor: 'rgba(22,93,255,0.1)',
      borderWidth: 2,
      tension: 0.4,
      data: [3780,3800,3795,3820,3810,3830,3845,3835,3841],
      fill: true
    }]
  },
  options: {
    plugins: { legend: false },
    scales: { x: { display: false }, y: { display: false } },
    elements: { point: { radius: 0 } }
  }
});

// ==========================
// 钱包弹窗
// ==========================
const modal = document.getElementById('walletModal');
document.getElementById('connectBtn').onclick = () => modal.style.display = 'flex';
document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
modal.onclick = (e) => e.target === modal && (modal.style.display = 'none');

// ==========================
// 对接你后端的真实跨链接口
// ==========================
document.getElementById('swapBtn').onclick = async () => {
  const fromChain = document.getElementById('fromChain').value;
  const fromToken = document.getElementById('fromToken').value;
  const fromAmount = document.getElementById('fromAmount').value;
  const toChain = document.getElementById('toChain').value;
  const toToken = document.getElementById('toToken').value;

  if (!fromAmount) return alert('Please enter amount');

  try {
    // ↓↓↓ 这里直接对接你的真实后端接口 ↓↓↓
    const { data } = await axios.post('http://localhost:3000/api/swap', {
      fromChain,
      fromToken,
      fromAmount,
      toChain,
      toToken
    });

    document.getElementById('toAmount').value = data.estimatedAmount;
    alert('Swap initialized: ' + data.txHash);
  } catch (err) {
    alert('Swap error: ' + (err.response?.data?.message || err.message));
  }
};

// 启动
loadPrices();
</script>

</body>
</html>
