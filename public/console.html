<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge | Cross-Chain Swap</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

<style>
body { background:#090B10; color:#fff; font-family:Inter; }
.glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.08); }
.btn { transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); }
</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between items-center px-6 py-4 border-b border-gray-800">
  <div class="text-xl font-bold text-blue-500">AstroBridge</div>
  <button id="connectBtn" class="btn bg-blue-500 px-4 py-2 rounded-lg text-sm">Connect Wallet</button>
</div>

<!-- MARKET BAR -->
<div id="ticker" class="flex gap-6 px-6 py-2 text-sm border-b border-gray-800 text-gray-400">
Loading market...
</div>

<!-- MAIN -->
<div class="max-w-md mx-auto mt-10">

<div class="glass p-6 rounded-2xl">

<!-- TITLE -->
<h2 class="text-lg font-semibold">Cross-Chain Swap</h2>
<p class="text-sm text-gray-400 mt-1">Fast · Secure · AI-Routed</p>

<!-- TRUST -->
<div class="flex gap-3 text-xs text-gray-500 mt-3">
<span>🔒 Non-Custodial</span>
<span>⚡ 30+ Chains</span>
<span>🤖 AI Routing</span>
</div>

<!-- FROM -->
<div class="mt-5">
<div class="text-xs text-gray-400 mb-1">From</div>
<div class="bg-black p-4 rounded-xl">
<input id="amount" class="w-full text-2xl bg-transparent outline-none" placeholder="0.0">
<div class="flex justify-between mt-2 text-sm">
<span>ETH</span>
<span class="text-gray-500">Balance: --</span>
</div>
</div>
</div>

<!-- SWITCH -->
<div class="text-center my-3 text-gray-500">
<i class="fa fa-exchange"></i>
</div>

<!-- TO -->
<div>
<div class="text-xs text-gray-400 mb-1">To</div>
<div class="bg-black p-4 rounded-xl">
<input id="output" readonly class="w-full text-2xl bg-transparent outline-none" placeholder="0.0">
<div class="flex justify-between mt-2 text-sm">
<span>BSC</span>
<span class="text-gray-500">Estimated</span>
</div>
</div>
</div>

<!-- INFO -->
<div class="mt-4 text-sm text-gray-400 space-y-1">
<div class="flex justify-between"><span>Route</span><span class="text-blue-400">AI Optimized</span></div>
<div class="flex justify-between"><span>Network Fee</span><span>~$0.3</span></div>
<div class="flex justify-between"><span>Time</span><span>~20s</span></div>
</div>

<!-- BUTTON -->
<button id="swapBtn" class="btn w-full mt-5 py-4 bg-blue-500 rounded-xl font-semibold">
Enter Amount
</button>

<!-- HINT -->
<div class="text-center text-xs text-gray-500 mt-3">
Try swapping 10 USDT → BSC
</div>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 right-6 hidden bg-black px-4 py-2 rounded-lg"></div>

<script>

let account = null;

function toast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

// WALLET
connectBtn.onclick = async ()=>{
  if(!window.ethereum) return alert('Install MetaMask');
  const acc = await window.ethereum.request({method:'eth_requestAccounts'});
  account = acc[0];
  connectBtn.innerText = account.slice(0,6)+'...'+account.slice(-4);
};

// INPUT
amount.oninput = async (e)=>{
  const val = e.target.value;

  if(!val){
    swapBtn.innerText = 'Enter Amount';
    return;
  }

  swapBtn.innerText = 'Calculating...';

  try{
    const res = await axios.get('https://li.quest/v1/quote',{
      params:{
        fromChain:'ETH',
        toChain:'BSC',
        fromToken:'USDT',
        toToken:'USDT',
        fromAmount: val*1e6
      }
    });

    output.value = (res.data.toAmount/1e6).toFixed(4);
    swapBtn.innerText = 'Swap Now';

  }catch(e){
    swapBtn.innerText = 'Error';
  }
};

// SWAP
swapBtn.onclick = ()=>{
  if(!account) return toast('Connect wallet');
  if(!amount.value) return;

  swapBtn.innerText = 'Swapping...';

  setTimeout(()=>{
    swapBtn.innerText = 'Success';
    toast('Swap completed');
  },2000);
};

// MARKET
async function load(){
  const {data} = await axios.get('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
  ticker.innerHTML = `BTC $${data.bitcoin.usd} | ETH $${data.ethereum.usd}`;
}
load();

</script>

</body>
</html>
