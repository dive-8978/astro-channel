<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge | Cross-Chain Swap</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/themes/base/jquery-ui.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/jquery-ui.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        astro: '#165DFF',
        dark: '#0F1116',
        darker: '#090B10',
        card: '#1A1D26',
      }
    }
  }
}
</script>

<style type="text/tailwindcss">
@layer utilities {
  .glass {
    background: rgba(255,255,255,0.035);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .animate-glow {
    animation: glow 3s infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 12px #165DFF33; }
    to { box-shadow: 0 0 22px #165DFF66; }
  }
}
#ui-datepicker-div {
  background: #1a1d26;
  color: white;
  border: 1px solid #333;
}
.ui-datepicker-header {
  background: #165DFF;
}
</style>
</head>

<body class="bg-dark text-gray-100 min-h-screen">

<!-- NAV -->
<nav class="sticky top-0 z-50 bg-darker/90 backdrop-blur-md border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="text-astro text-2xl font-bold">AstroBridge</div>
      <span class="text-xs px-2 py-1 rounded bg-astro/20 text-astro">Astronomy</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/" class="px-3 py-1.5 rounded-lg bg-astro text-white text-sm">
        <i class="fa fa-home mr-1"></i> Home
      </a>
      <button id="connectBtn" class="px-4 py-2 rounded-lg bg-astro hover:bg-astro/90 text-white font-medium">
        <i class="fa fa-link mr-1"></i> Connect Wallet
      </button>
    </div>
  </div>
</nav>

<!-- REAL-TIME TICKER -->
<div class="bg-card border-b border-gray-800 py-2 overflow-x-auto">
  <div class="max-w-7xl mx-auto px-4 flex gap-6 whitespace-nowrap text-sm" id="ticker">
    连接实时价格中...
  </div>
</div>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-4 py-10 grid md:grid-cols-3 gap-6">

  <!-- LEFT: CHART + DATE + COIN SELECTOR -->
  <div class="md:col-span-1 space-y-4">
    <div class="glass p-4 rounded-xl">
      <h3 class="text-lg font-bold mb-3 flex items-center">
        <i class="fa fa-line-chart mr-2 text-astro"></i> Market Chart
      </h3>

      <!-- 币种选择 + 日期选择 -->
      <div class="flex gap-2 mb-3">
        <select id="coinSelector" class="flex-1 bg-card text-sm p-2 rounded-lg border border-gray-700">
          <option value="BTCUSDT">Bitcoin (BTC)</option>
          <option value="ETHUSDT">Ethereum (ETH)</option>
        </select>
        <input type="text" id="datePicker" placeholder="Select date" class="flex-1 bg-card text-sm p-2 rounded-lg border border-gray-700 w-28">
      </div>

      <canvas id="priceChart" height="190"></canvas>
    </div>

    <div class="glass p-4 rounded-xl h-[340px] overflow-y-auto">
      <h3 class="text-lg font-bold mb-3 flex items-center">
        <i class="fa fa-bars mr-2 text-astro"></i> Top Pairs
      </h3>
      <div class="space-y-2 text-sm" id="marketList">
        加载中...
      </div>
    </div>
  </div>

  <!-- SWAP PANEL -->
  <div class="md:col-span-2">
    <div class="glass p-6 rounded-2xl animate-glow">
      <h2 class="text-xl font-bold">Astronomy Cross-Chain Swap</h2>
      <p class="text-sm text-gray-400 mt-1">Non-Custodial • AI-Optimized • All-Chain</p>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-sm text-gray-400 block mb-1">From</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <select class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>ETH</option>
              <option>BSC</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <select class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>USDT</option>
              <option>ETH</option>
              <option>BNB</option>
              <option>MA</option>
            </select>
            <input type="number" placeholder="0.00" class="flex-2 bg-card border border-gray-700 rounded-lg p-3 text-right">
          </div>
        </div>

        <div class="flex justify-center">
          <button class="w-10 h-10 rounded-full bg-astro/20 text-astro flex items-center justify-center">
            <i class="fa fa-exchange"></i>
          </button>
        </div>

        <div>
          <label class="text-sm text-gray-400 block mb-1">To</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <select class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>BSC</option>
              <option>ETH</option>
              <option>ARB</option>
              <option>OP</option>
            </select>
            <select class="flex-1 bg-card border border-gray-700 rounded-lg p-3 text-sm">
              <option>MA</option>
              <option>USDT</option>
              <option>ETH</option>
              <option>BNB</option>
            </select>
            <input readonly placeholder="0.00" class="flex-2 bg-card border border-gray-700 rounded-lg p-3 text-right">
          </div>
        </div>

        <div class="bg-card/60 rounded-lg p-3 text-sm text-gray-300 space-y-1">
          <div class="flex justify-between"><span>Route</span><span class="text-astro">AstroBridge AI</span></div>
          <div class="flex justify-between"><span>Network Fee</span><span>~$0.25</span></div>
          <div class="flex justify-between"><span>Time</span><span>~20s</span></div>
        </div>

        <button class="w-full py-4 rounded-xl bg-astro hover:bg-astro/90 text-white font-bold text-lg">
          Swap & Cross-Chain Transfer
        </button>
      </div>
    </div>

    <div class="mt-6 grid grid-cols-3 gap-3 text-sm">
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">29+</div>
        <div class="text-xs text-gray-400">Blockchains</div>
      </div>
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">100K+</div>
        <div class="text-xs text-gray-400">Users</div>
      </div>
      <div class="glass p-3 rounded-xl text-center">
        <div class="text-astro text-lg font-bold">$1.4B+</div>
        <div class="text-xs text-gray-400">24h Volume</div>
      </div>
    </div>
  </div>
</main>

<!-- WALLET MODAL -->
<div id="walletModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
  <div class="glass w-full max-w-sm mx-4 rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold">Connect Wallet</h3>
      <button id="closeModal" class="text-gray-400 hover:text-white"><i class="fa fa-times"></i></button>
    </div>
    <div class="space-y-3">
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-puzzle-piece text-xl"></i> MetaMask
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-qrcode text-xl"></i> WalletConnect (Mobile)
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-money text-xl"></i> Trust Wallet
      </button>
      <button class="w-full p-3 rounded-xl bg-card border border-gray-700 hover:bg-astro/10 transition flex items-center gap-3">
        <i class="fa fa-star text-xl"></i> Phantom
      </button>
    </div>
  </div>
</div>

<script>
// ==============================================
// 图表初始化
// ==============================================
const ctx = document.getElementById('priceChart').getContext('2d');
let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Price',
      borderColor: '#165DFF',
      backgroundColor: 'rgba(22,93,255,0.1)',
      borderWidth: 2,
      tension: 0.4,
      data: [],
      fill: true
    }]
  },
  options: {
    plugins: { legend: false },
    scales: { x: { display: false }, y: { display: false } },
    elements: { point: { radius: 0 } }
  }
});

// ==============================================
// 日期选择器
// ==============================================
$(function() {
  $("#datePicker").datepicker({
    dateFormat: "yy-mm-dd",
    onSelect: function() {
      loadKline($("#coinSelector").val(), this.value);
    }
  });
  $("#coinSelector").change(function() {
    loadKline($(this).val(), $("#datePicker").val());
  });
  // 默认加载今天 BTC
  const today = new Date().toISOString().split('T')[0];
  $("#datePicker").val(today);
  loadKline("BTCUSDT", today);
});

// ==============================================
// 加载币安 K 线
// ==============================================
async function loadKline(symbol, date) {
  if (!date) return;
  const startTime = new Date(date).getTime();
  const endTime = startTime + 86400000;

  const { data } = await axios.get("https://api.binance.com/api/v3/klines", {
    params: { symbol, interval: "1h", startTime, endTime, limit: 24 }
  });

  const times = [];
  const prices = [];
  data.forEach(d => {
    times.push(new Date(d[0]).getHours() + "h");
    prices.push(parseFloat(d[4]));
  });

  chart.data.labels = times;
  chart.data.datasets[0].data = prices;
  chart.update();
}

// ==============================================
// 实时价格 WebSocket
// ==============================================
const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/ethusdt@trade/bnbusdt@trade/solusdt@trade');
ws.onmessage = function(e) {
  const d = JSON.parse(e.data);
  const s = d.s.replace("USDT", "");
  const p = parseFloat(d.p).toFixed(2);
  const color = d.m ? "#ef4444" : "#22c55e";

  const el = document.getElementById(s);
  if (el) { el.innerHTML = "$" + p; el.style.color = color; }

  const mel = document.getElementById("M"+s);
  if (mel) { mel.innerHTML = "$" + p; mel.style.color = color; }
};

// ==============================================
// 初始化行情面板
// ==============================================
document.getElementById("ticker").innerHTML = `
  <div class="flex items-center gap-2">BTC <span id="BTC">$0</span></div>
  <div class="flex items-center gap-2">ETH <span id="ETH">$0</span></div>
  <div class="flex items-center gap-2">BNB <span id="BNB">$0</span></div>
  <div class="flex items-center gap-2">SOL <span id="SOL">$0</span></div>
  <div class="flex items-center gap-2">USDT <span class="text-gray-400">$1.00</span></div>
  <div class="flex items-center gap-2">MA <span class="text-astro">$0.00186</span></div>
`;

document.getElementById("marketList").innerHTML = `
  <div class="flex justify-between py-2 border-b border-gray-700">BTC/USDT <span id="MBTC">$0</span></div>
  <div class="flex justify-between py-2 border-b border-gray-700">ETH/USDT <span id="METH">$0</span></div>
  <div class="flex justify-between py-2 border-b border-gray-700">BNB/USDT <span id="MBNB">$0</span></div>
  <div class="flex justify-between py-2 border-b border-gray-700">SOL/USDT <span id="MSOL">$0</span></div>
  <div class="flex justify-between py-2 border-b border-gray-700">MA/USDT <span class="text-astro">$0.00186</span></div>
`;

// ==============================================
// 钱包弹窗
// ==============================================
const modal = document.getElementById("walletModal");
connectBtn.onclick = () => modal.style.display = "flex";
closeModal.onclick = () => modal.style.display = "none";
modal.onclick = (e) => e.target === modal && (modal.style.display = "none");
</script>

</body>
</html>
