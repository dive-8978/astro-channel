<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge - Console</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#020617;color:#fff;overflow-x:hidden}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.5}
.container{max-width:1000px;margin:auto;padding:40px 20px;position:relative;z-index:2}
nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:50px}
.logo{font-size:2rem;font-weight:800;background:linear-gradient(90deg,#4cc9f0,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:24px}
.nav-links{display:flex;gap:22px}
.nav-links a{color:#a8dadc;text-decoration:none;font-weight:500;transition:.3s}
.nav-links a:hover{color:#4cc9f0}
.x-icon{width:34px;height:34px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;border:1px solid #4cc9f0}
.x-icon:hover{transform:scale(1.1);border-color:#f72585}
.x-icon svg{width:15px;height:15px;fill:#fff}

.page-title{font-size:2.8rem;margin-bottom:12px;background:linear-gradient(90deg,#4cc9f0,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-desc{color:#a8dadc;font-size:1.1rem;margin-bottom:40px}

.console-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(76,201,240,0.2);
  border-radius:16px;
  padding:30px;
  margin-bottom:20px;
}
.console-card h3{
  color:#4cc9f0;
  font-size:1.4rem;
  margin-bottom:12px;
}
.console-card p{
  color:#a8dadc;
  line-height:1.7;
  margin-bottom:16px;
}
.input-line{
  margin-bottom:18px;
}
.input-line label{
  display:block;color:#a8dadc;margin-bottom:6px;font-size:0.9rem;
}
.input-line input{
  width:100%;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid rgba(76,201,240,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:1rem;
  outline:none;
}
.input-line input:focus{
  border-color:#4cc9f0;
}
.btn-primary{
  display:inline-block;
  padding:14px 26px;
  background:linear-gradient(90deg,#4cc9f0,#f72585);
  color:#fff;
  border:none;border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}
.btn-primary:hover{
  transform:scale(1.03);
}

.btn-back{display:inline-block;margin-top:40px;padding:12px 24px;background:linear-gradient(90deg,#4cc9f0,#f72585);color:#fff;border-radius:30px;text-decoration:none;font-weight:600}
footer{margin-top:60px;padding-top:30px;border-top:1px solid rgba(255,255,255,0.08);color:#a8dadc;text-align:center}
@media(max-width:768px){.page-title{font-size:2rem}}
</style>
</head>
<body>
<div id="particles"></div>
<div class="container">

<nav>
  <div class="logo">AstroBridge</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="vision.html">Vision</a>
      <a href="painpoints.html">Pain Points</a>
      <a href="technology.html">Technology</a>
      <a href="progress.html">Progress</a>
    </div>
    <div class="x-icon" onclick="window.open('https://x.com/Astro___Channel','_blank')">
      <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
    </div>
  </div>
</nav>

<h1 class="page-title">Demo Console</h1>
<p class="page-desc">Try AstroBridge Intent Execution (Testnet Only)</p>

<div class="console-card">
  <h3>Intent Demo</h3>
  <p>Enter a simple intent, and the AI will route and execute it across chains.</p>

  <div class="input-line">
    <label>Your Intent (e.g., Swap 0.1 ETH to USDC on Arbitrum)</label>
    <input type="text" placeholder="Type your intent here...">
  </div>

  <div class="input-line">
    <label>Your Wallet Address (Test)</label>
    <input type="text" placeholder="0x...">
  </div>

  <button class="btn-primary">Execute Intent</button>
</div>

<a href="../index.html" class="btn-back">← Back to Home</a>

<footer>
  <p>© 2026 AstroBridge | FOR DEMONSTRATION ONLY</p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles",{
  particles:{
    number:{value:80,density:{enable:true,value_area:800}},
    color:{value:["#4cc9f0","#f72585"]},
    opacity:{value:0.4,random:true},
    size:{value:3,random:true},
    line_linked:{enable:true,distance:150,color:"#4cc9f0",opacity:0.15,width:1},
    move:{enable:true,speed:1.5,random:true}
  },
  interactivity:{events:{onhover:{enable:true,mode:"grab"}}},
  retina_detect:true
})
</script>
</body>
</html>
