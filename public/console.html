<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroBridge • Intent Trading Terminal</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'genesis-blue': '#40c4ff',
            'genesis-purple': '#7c4dff',
            'void-black': '#02040f',
            'star-gold': '#ffd54f',
            'nebula-teal': '#26c6da',
          },
          fontFamily: {
            'orbitron': ['Orbitron', 'sans-serif'],
            'exo': ['Exo 2', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">

  <!-- Three.js + GLTFLoader -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/loaders/GLTFLoader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>

  <style>
    body {
      background: #02040f url('https://cdn.esawebb.org/archives/images/publicationjpg/pillars_of_creation_composite.jpg') center 30% / cover fixed;
      color: #e3f2fd;
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    .nebula-flow { /* 保持原有星云 */ 
      position: fixed; inset: 0; z-index: -3; pointer-events: none;
      background: radial-gradient(ellipse at 40% 30%, rgba(124,77,255,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 65%, rgba(38,198,218,0.08) 0%, transparent 65%);
      background-size: 220% 220%;
      animation: nebula-flow 520s ease-in-out infinite;
      mix-blend-mode: screen; opacity: 0.4; filter: blur(70px);
    }
    @keyframes nebula-flow { 0%,100% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } }

    .stars-container { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
    .stars-layer { position: absolute; inset: 0; }

    .glass-panel { /* 保持原有玻璃风格 */ 
      background: rgba(8,15,40,0.26);
      backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid rgba(64,196,255,0.20);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 0 20px rgba(64,196,255,0.05);
      border-radius: 1.25rem;
      transition: all 0.4s ease;
    }

    .glass-panel:hover { border-color: rgba(64,196,255,0.40); }

    .neon-text { text-shadow: 0 0 10px #40c4ff, 0 0 20px #7c4dff; }

    .btn-neon {
      background: linear-gradient(135deg, #40c4ff, #7c4dff);
      box-shadow: 0 0 20px rgba(64,196,255,0.5);
      transition: all 0.4s;
    }

    .btn-neon:hover { box-shadow: 0 0 40px rgba(64,196,255,0.75); transform: scale(1.03); }

    /* ─── AI 3D 脸专用样式 ─── */
    #ai-face-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 180px;
      height: 180px;
      z-index: 99;
      pointer-events: auto;
      cursor: grab;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(64,196,255,0.4);
      box-shadow: 0 0 30px rgba(64,196,255,0.5), inset 0 0 20px rgba(64,196,255,0.2);
      backdrop-filter: blur(8px);
      background: rgba(2,4,15,0.6);
      transition: all 0.4s ease;
    }

    #ai-face-container:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(64,196,255,0.8);
    }

    #ai-face-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <div class="nebula-flow"></div>
  <div class="stars-container">
    <div class="stars-layer" id="stars-far"></div>
    <div class="stars-layer" id="stars-mid"></div>
    <div class="stars-layer" id="stars-near"></div>
  </div>

  <!-- AI 3D 人脸容器（右下角） -->
  <div id="ai-face-container" title="Grok AI Consciousness">
    <canvas id="ai-face-canvas"></canvas>
  </div>

  <!-- 其余导航、主内容、钱包弹窗等保持不变，这里省略重复代码 -->
  <!-- 请把你之前的完整 nav、main、wallet modal、footer、script 逻辑粘贴到这里 -->

  <!-- 示例：只保留核心交互部分 -->
  <nav class="glass-panel px-8 py-4 flex justify-between items-center sticky top-0 z-50 border-b border-genesis-blue/20 backdrop-blur-xl">
    <!-- ... 你的导航代码 ... -->
  </nav>

  <main class="max-w-5xl mx-auto p-8 pt-12 pb-20 relative z-10">
    <!-- ... 你的交易界面代码 ... -->
  </main>

  <script>
    // 星尘生成（保持原样）
    function generateStars(id, count, min, max, op) {
      let s = [];
      for (let i = 0; i < count; i++) {
        let x = Math.random() * 100, y = Math.random() * 100;
        let sz = Math.random() * (max - min) + min;
        s.push(`${x}vw ${y}vh ${sz}px #e3f2fd`);
      }
      document.getElementById(id).style.boxShadow = s.join(',');
      document.getElementById(id).style.opacity = op;
    }
    generateStars('stars-far', 70, 0.4, 1.1, 0.42);
    generateStars('stars-mid', 35, 0.9, 1.7, 0.62);
    generateStars('stars-near', 12, 1.4, 2.8, 0.78);

    // ─── Grok 风格 3D AI 脸 ───
    const container = document.getElementById('ai-face-container');
    const canvas = document.getElementById('ai-face-canvas');

    let scene, camera, renderer, model, mouseX = 0, mouseY = 0;

    function init3DFace() {
      scene = new THREE.Scene();
      scene.background = null; // 透明

      camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
      camera.position.z = 3.5;

      renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderer.setSize(180, 180);
      renderer.setPixelRatio(window.devicePixelRatio);

      // 光源（科幻蓝紫光）
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0x40c4ff, 1.2, 50);
      pointLight.position.set(2, 2, 3);
      scene.add(pointLight);

      const purpleLight = new THREE.PointLight(0x7c4dff, 0.8, 50);
      purpleLight.position.set(-2, -1, 4);
      scene.add(purpleLight);

      // 简单粒子/低多边形头部替代（因为没有官方 Grok 3D 模型）
      const geometry = new THREE.SphereGeometry(1, 32, 32);
      const material = new THREE.MeshStandardMaterial({
        color: 0x0a1f3a,
        metalness: 0.3,
        roughness: 0.4,
        emissive: 0x112244,
        emissiveIntensity: 0.4,
        wireframe: false
      });

      model = new THREE.Mesh(geometry, material);
      scene.add(model);

      // 加眼睛（两个小球）
      const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0x40c4ff });

      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.35, 0.25, 0.9);
      model.add(leftEye);

      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.35, 0.25, 0.9);
      model.add(rightEye);

      // 呼吸动画
      function animate() {
        requestAnimationFrame(animate);

        // 缓慢旋转 + 呼吸缩放
        model.rotation.y += 0.003;
        const scale = 1 + Math.sin(Date.now() * 0.001) * 0.04;
        model.scale.set(scale, scale, scale);

        // 眼神跟随鼠标（在容器内）
        const rect = container.getBoundingClientRect();
        const x = (mouseX - rect.left) / rect.width * 2 - 1;
        const y = -((mouseY - rect.top) / rect.height * 2 - 1);

        leftEye.position.x = -0.35 + x * 0.15;
        rightEye.position.x = 0.35 + x * 0.15;
        leftEye.position.y = 0.25 + y * 0.15;
        rightEye.position.y = 0.25 + y * 0.15;

        renderer.render(scene, camera);
      }
      animate();
    }

    // 鼠标移动事件（只在容器内生效）
    container.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // 初始化
    init3DFace();

    window.addEventListener('resize', () => {
      const size = container.clientWidth;
      renderer.setSize(size, size);
      camera.aspect = 1;
      camera.updateProjectionMatrix();
    });

    // 其余钱包、意图解析、执行等脚本保持不变...
    // 请把你之前的钱包连接、parseIntent、execute 等逻辑粘贴到这里
  </script>
</body>
</html>
