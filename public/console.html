<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroBridge | Cross-Chain Swap</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/themes/base/jquery-ui.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">

<!-- NAV -->
<nav class="sticky top-0 bg-darker/90 backdrop-blur-md border-b border-white/5 p-3 flex justify-between items-center">
  <div class="flex gap-2 items-center">
    <div class="text-astro text-2xl font-bold">AstroBridge</div>
    <span class="text-xs px-2 py-1 rounded bg-astro/20 text-astro">Astronomy</span>
  </div>
  <button id="connectBtn" class="bg-astro px-4 py-2 rounded text-white">Connect Wallet</button>
</nav>

<!-- REAL-TIME TICKER -->
<div class="bg-card border-b border-gray-800 py-2 overflow-x-auto text-sm">
  <div id="ticker" class="max-w-7xl mx-auto flex gap-6"></div>
</div>

<main class="max-w-7xl mx-auto p-4 grid md:grid-cols-3 gap-6">

  <!-- CHART -->
  <div class="md:col-span-1 space-y-4">
    <div class="bg-card p-4 rounded">
      <div class="font-bold text-lg text-astro mb-2">Market Chart</div>
      <div class="flex gap-2 mb-3">
        <select id="coinSelector" class="bg-card border p-2 text-sm rounded">
          <option value="BTCUSDT">Bitcoin (BTC)</option>
          <option value="ETHUSDT">Ethereum (ETH)</option>
          <option value="BNBUSDT">BNB</option>
          <option value="SOLUSDT">Solana (SOL)</option>
        </select>
        <input type="text" id="datePicker" class="bg-card border p-2 text-sm rounded">
      </div>
      <canvas id="priceChart" height="180"></canvas>
    </div>

    <div class="bg-card p-4 rounded h-[320px] overflow-y-auto text-sm">
      <div class="font-bold text-lg text-astro mb-2">Top Pairs</div>
      <div id="marketList"></div>
    </div>
  </div>

  <!-- SWAP PANEL -->
  <div class="md:col-span-2 bg-card p-6 rounded space-y-4">
    <div class="text-xl font-bold">Cross-Chain Swap</div>

    <div>
      <label class="text-gray-400">From</label>
      <div class="flex gap-2 mt-2">
        <select id="fromToken" class="bg-card border p-2 rounded w-1/3">
          <option>ETH</option><option>BTC</option><option>BNB</option><option>SOL</option>
        </select>
        <input id="amountIn" type="number" placeholder="0.00" class="bg-card border p-2 rounded w-2/3 text-right">
      </div>
    </div>

    <div class="text-center text-2xl text-astro">⇅</div>

    <div>
      <label class="text-gray-400">To</label>
      <div class="flex gap-2 mt-2">
        <select id="toToken" class="bg-card border p-2 rounded w-1/3">
          <option>BNB</option><option>ETH</option><option>BTC</option><option>SOL</option>
        </select>
        <input id="amountOut" readonly class="bg-card border p-2 rounded w-2/3 text-right" placeholder="0.00">
      </div>
    </div>

    <div class="bg-card/60 p-3 rounded text-sm space-y-1">
      <div class="flex justify-between"><span>Route</span><span id="routeAI" class="text-astro"></span></div>
      <div class="flex justify-between"><span>Network Fee</span><span>~$0.25</span></div>
      <div class="flex justify-between"><span>Time</span><span>~20s</span></div>
    </div>
    <button id="swapBtn" class="bg-astro text-white py-3 rounded w-full font-bold">Swap</button>
  </div>

</main>

<!-- WALLET MODAL -->
<div id="walletModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center">
  <div class="bg-card p-6 rounded max-w-sm w-full space-y-3">
    <div class="flex justify-between items-center">
      <div class="font-bold text-lg">Connect Wallet</div>
      <button id="closeModal"><i class="fa fa-times text-gray-400"></i></button>
    </div>
    <button class="wallet bg-card p-3 rounded w-full">MetaMask</button>
    <button class="wallet bg-card p-3 rounded w-full">Coinbase Wallet</button>
    <button class="wallet bg-card p-3 rounded w-full">Trust Wallet</button>
    <button class="wallet bg-card p-3 rounded w-full">Phantom</button>
  </div>
</div>

<script>
// Chart
const chart = new Chart(document.getElementById('priceChart'), {
  type:'line',
  data:{labels:[],datasets:[{data:[],borderColor:'#165DFF',fill:true,backgroundColor:'rgba(22,93,255,0.2)'}]},
  options:{plugins:{legend:false},scales:{x:{display:false},y:{display:false}}}
});

// Datepicker
$(function(){
  $("#datePicker").datepicker({dateFormat:'yy-mm-dd',onSelect:()=>loadKline($("#coinSelector").val(),$("#datePicker").val())});
  $("#coinSelector").change(()=>loadKline($("#coinSelector").val(),$("#datePicker").val()));
  $("#datePicker").val(new Date().toISOString().split('T')[0]);
  loadKline("BTCUSDT",$("#datePicker").val());
});

// Load K-line
async function loadKline(symbol,date){
  const start=new Date(date).getTime();
  const {data}=await axios.get("https://api.binance.com/api/v3/klines",{
    params:{symbol,interval:'1h',startTime:start,limit:24}
  });
  chart.data.labels=data.map(d=>new Date(d[0]).getHours()+"h");
  chart.data.datasets[0].data=data.map(d=>parseFloat(d[4]));
  chart.update();
}

// Real-time prices + 24h
const streams=["btcusdt","ethusdt","bnbusdt","solusdt"];
const ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams.map(s=>s+"@ticker_24hr").join("/")}`);
const priceMap={}, changeMap={};

ws.onmessage=e=>{
  const d=JSON.parse(e.data).data;
  const symbol=d.s.replace("USDT","");
  priceMap[symbol]=parseFloat(d.c);
  changeMap[symbol]=parseFloat(d.P);
  updateTicker(symbol,d);
  updateMarketList(symbol,d);
  calculateSwap();
};

function updateTicker(symbol,d){
  const pct=parseFloat(d.P).toFixed(2);
  const clr=pct>=0?'#22c55e':'#ef4444';
  const html=`$${parseFloat(d.c).toFixed(2)} <span style="color:${clr}">${pct}%</span>`;
  if(document.getElementById(symbol)){
    document.getElementById(symbol).innerHTML=html;
  }
}

function updateMarketList(symbol,d){
  const pct=parseFloat(d.P).toFixed(2);
  const clr=pct>=0?'#22c55e':'#ef4444';
  if(document.getElementById("M"+symbol)){
    document.getElementById("M"+symbol).innerHTML=`$${parseFloat(d.c).toFixed(2)} <span style="color:${clr}">${pct}%</span>`;
  }
}

ws.onclose=()=>setTimeout(()=>location.reload(),2000);

// Populate Ticker UI
document.getElementById("ticker").innerHTML=streams.map(s=>`
  <div class="flex gap-1"><strong>${s.replace("usdt","").toUpperCase()}</strong> <span id="${s.replace("usdt","")}"></span></div>
`).join("");

// Populate MarketList UI
document.getElementById("marketList").innerHTML=streams.map(s=>`
  <div class="flex justify-between py-2 border-b border-gray-700">
    ${s.replace("usdt","").toUpperCase()}/USDT <span id="M${s.replace("usdt","")}"></span>
  </div>
`).join("");

// Swap calc
function calculateSwap(){
  const amt=parseFloat(document.getElementById("amountIn").value);
  const from=document.getElementById("fromToken").value;
  const to=document.getElementById("toToken").value;
  if(!amt||!priceMap[from]||!priceMap[to]) return;
  document.getElementById("amountOut").value=(amt*priceMap[from]/priceMap[to]).toFixed(4);
}
document.getElementById("amountIn").addEventListener("input",calculateSwap);

// Wallet
const modal=document.getElementById("walletModal");
document.getElementById("connectBtn").onclick=()=>modal.classList.remove("hidden");
document.getElementById("closeModal").onclick=()=>modal.classList.add("hidden");
let provider,signer;
document.querySelectorAll(".wallet").forEach(btn=>{
  btn.onclick=async()=>{
    if(!window.ethereum) return alert("Install MetaMask");
    provider=new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer=await provider.getSigner();
    const addr=await signer.getAddress();
    document.getElementById("connectBtn").innerText=addr.slice(0,6)+"..."+addr.slice(-4);
    modal.classList.add("hidden");
  }
});

// AI Route
setInterval(()=>{
  const r=["ETH→USDT→BNB","ETH→SOL→BNB","BTC→USDT→ETH"];
  document.getElementById("routeAI").innerText=r[Math.floor(Math.random()*r.length)];
},2000);

// Swap Button
document.getElementById("swapBtn").onclick=()=>alert("Swap Demo Submitted!");
</script>

</body>
</html>
